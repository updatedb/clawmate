# ── ClawMate v1.5 — docker-compose ─────────────────────────────────
# Usage:
#   docker-compose up -d
#
# 环境变量说明:
#   CLAWMATE_PUBLIC_BASE_URL      必填，外部访问地址（如 https://example.com:5533）
#   CLAWMATE_HOOK_TOKEN           选填，OpenClaw webhook token（反馈 agent 唤醒用）
#   CLAWMATE_GATEWAY_URL          选填，OpenClaw gateway 地址，默认 http://host.docker.internal:18789
#   CLAWMATE_ONLYOFFICE_URL       选填，ONLYOFFICE Document Server JS URL
#   CLAWMATE_ONLYOFFICE_JWT_SECRET 选填，ONLYOFFICE JWT 密钥
#   CLAWMATE_MAX_UPLOAD_MB        选填，上传文件大小限制，默认 100
#   CLAWMATE_ENABLE_SUBTITLE      选填，字幕提取功能（需安装 faster-whisper），设置 1 启用
#
# 目录挂载说明:
#   config.json → 配置文件，用户需自行创建并挂载（参考 config.example.json）
#   /data       → 文件浏览根目录，config.json 中 roots[].dir 需指向容器内路径（如 /data/media）

services:
  clawmate:
    build: .
    container_name: clawmate
    ports:
      - "${CLAWMATE_PORT:-5533}:5533"
    volumes:
      # 挂载配置文件（必须）
      - ./config.json:/app/config.json:ro
      # 挂载数据目录（根据 config.json roots 配置调整）
      - /openclaw/store/data:/data
    environment:
      - CLAWMATE_PORT=5533
      - CLAWMATE_CONFIG=/app/config.json
      - CLAWMATE_PUBLIC_BASE_URL=${CLAWMATE_PUBLIC_BASE_URL:-}
      - CLAWMATE_HOOK_TOKEN=${CLAWMATE_HOOK_TOKEN:-}
      - CLAWMATE_GATEWAY_URL=${CLAWMATE_GATEWAY_URL:-http://host.docker.internal:18789}
      - CLAWMATE_ONLYOFFICE_JWT_SECRET=${CLAWMATE_ONLYOFFICE_JWT_SECRET:-}
      - CLAWMATE_ONLYOFFICE_URL=${CLAWMATE_ONLYOFFICE_URL:-}
      - CLAWMATE_MAX_UPLOAD_MB=${CLAWMATE_MAX_UPLOAD_MB:-100}
      - CLAWMATE_ENABLE_SUBTITLE=${CLAWMATE_ENABLE_SUBTITLE:-0}
    restart: unless-stopped

