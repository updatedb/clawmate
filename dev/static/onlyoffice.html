<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONLYOFFICE 预览</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      scrollbar-width: none;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #0f1115;
      color: #f2f4f8;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
    #onlyoffice {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .hidden { display: none; }
    .fallback {
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
    }
    .fallback-title {
      font-size: 14px;
      margin-bottom: 10px;
      color: #f8b4b4;
    }
    .fallback-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .fallback-actions a {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #f2f4f8;
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="fallback" class="fallback hidden">
    <div class="fallback-title" id="fallbackTitle">ONLYOFFICE 无法预览该文件，请使用原始预览或下载。</div>
    <div class="fallback-actions">
      <a id="fallbackOpen" href="#" target="_blank" rel="noopener">打开原始预览</a>
      <a id="fallbackDownload" href="#" target="_blank" rel="noopener" download>下载文件</a>
      <button id="fallbackPdfJs" class="hidden" style="padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#f2f4f8;cursor:pointer;font-size:13px;">📄 使用 PDF.js 预览</button>
    </div>
  </div>
  <div id="onlyoffice"></div>

  <script>
    const fallbackEl = document.getElementById("fallback");
    const fallbackOpen = document.getElementById("fallbackOpen");
    const fallbackDownload = document.getElementById("fallbackDownload");
    let fallbackShown = false;
    let fallbackDownloadUrl = "#";

    function showFallback(message, downloadUrl, isPdf) {
      if (fallbackShown) return;
      fallbackShown = true;
      const title = fallbackEl.querySelector("#fallbackTitle");
      if (title) title.textContent = message || 'ONLYOFFICE 无法预览该文件，请使用原始预览或下载。';
      if (downloadUrl) {
        fallbackOpen.href = downloadUrl;
        fallbackDownload.href = downloadUrl;
      }
      if (isPdf) {
        const pdfJsBtn = fallbackEl.querySelector("#fallbackPdfJs");
        if (pdfJsBtn) pdfJsBtn.classList.remove("hidden");
      }
      fallbackEl.classList.remove("hidden");
      if (isPdf && window.parent !== window) {
        try {
          window.parent.postMessage({ type: 'onlyoffice-error', isPdf: true }, '*');
        } catch (_) {}
      }
    }

    async function loadOnlyOfficeScript() {
      const scriptUrl = await fetch('/api/clawmate/onlyoffice/script-url')
        .then(r => r.json())
        .then(d => d.url)
        .catch(() => '');
      if (!scriptUrl) {
        setStatus('ONLYOFFICE JS URL 未配置');
        return;
      }
      return new Promise((resolve, reject) => {
        if (window.DocsAPI) return resolve();
        const script = document.createElement('script');
        script.src = scriptUrl;
        script.onload = resolve;
        script.onerror = () => reject(new Error('script load failed'));
        document.head.appendChild(script);
      });
    }

    async function init() {
      await loadOnlyOfficeScript();
      const params = new URLSearchParams(window.location.search);
      const root = params.get("root");
      const path = params.get("path");
      const mode = params.get("mode") || "view";

      if (!root || !path) return;

      const downloadUrl = `/api/clawmate/download?root=${encodeURIComponent(root)}&path=${encodeURIComponent(path)}`;
      fallbackDownloadUrl = downloadUrl;
            const theme = params.get('theme') || 'light';
      const url = `/api/clawmate/onlyoffice/config?root=${encodeURIComponent(root)}&path=${encodeURIComponent(path)}&mode=${encodeURIComponent(mode)}&theme=${encodeURIComponent(theme)}`;
      const res = await fetch(url);
      if (!res.ok) {
        showFallback("无法获取 ONLYOFFICE 配置，请使用原始预览或下载。", downloadUrl);
        return;
      }
      const data = await res.json();
      const config = data.config || data;
      if (!config || !config.document) {
        showFallback("ONLYOFFICE 配置不完整，请使用原始预览或下载。", downloadUrl);
        return;
      }

      config.events = {
        ...(config.events || {}),
        onDocumentReady: () => {
          setTimeout(() => {
            const innerIframe = document.querySelector('#onlyoffice iframe');
            if (innerIframe && innerIframe.contentDocument) {
              try {
                innerIframe.contentWindow.scrollTo(0, innerIframe.contentDocument.body.scrollHeight);
              } catch (_) {}
            }
          }, 2000);
        },
        onError: () => {
          const isPdf = (config.documentType || "").toLowerCase() === "pdf" || (config.document.fileType || "").toLowerCase() === "pdf";
          const message = isPdf
            ? "ONLYOFFICE 当前不支持 PDF 预览，请使用原始预览或下载。"
            : "ONLYOFFICE 无法预览该文件，请使用原始预览或下载。";
          showFallback(message, downloadUrl, isPdf);
        },
      };

      let docEditor;
      try {
        docEditor = new DocsAPI.DocEditor("onlyoffice", config);
      } catch (err) {
        showFallback("ONLYOFFICE 初始化失败，请使用原始预览或下载。", downloadUrl);
      }

      // Listen for print/export commands from parent page
      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'print-document' && docEditor) {
          try {
            docEditor.serviceCommand('print');
          } catch (_) {
            // fallback: try native print
            window.print();
          }
        }
      });
    }

    init().catch(() => {
      showFallback("ONLYOFFICE 初始化失败，请使用原始预览或下载。", fallbackDownloadUrl, false);
    });

    document.getElementById('fallbackPdfJs').addEventListener('click', () => {
      const params = new URLSearchParams(window.location.search);
      const root = params.get('root');
      const path = params.get('path');
      const rawUrl = `/api/clawmate/raw?root=${encodeURIComponent(root)}&path=${encodeURIComponent(path)}`;
      const pdfJsUrl = `/clawmate/pdfjs/viewer.html?file=${encodeURIComponent(window.location.origin + rawUrl)}`;
      const onlyofficeDiv = document.getElementById('onlyoffice');
      if (onlyofficeDiv) onlyofficeDiv.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.src = pdfJsUrl;
      iframe.style.cssText = 'width:100%;height:100%;border:none;';
      document.body.appendChild(iframe);
      fallbackEl.classList.add('hidden');
    });
  </script>
</body>
</html>
