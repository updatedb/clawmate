<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" sizes="32x32" href="./asset/clawmate-logo.png" />
  <link rel="apple-touch-icon" href="./asset/clawmate-logo.png" />
  <link rel="manifest" href="./manifest.json" />
  <title>分享 · ClawMate</title>
  <!-- Anti-flash: apply theme BEFORE first paint -->
  <script>
    (function(){try{var t=localStorage.getItem('clawmate-theme')||'auto';if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}else if(t==='auto'){if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark');}}}catch(e){}})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css?v=20260625a" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="highlight-theme-css" />
  <link rel="stylesheet" href="./vendor/github-markdown-dark.min.css" id="github-markdown-css" />
  <link rel="stylesheet" href="./vendor/katex.min.css" />
  <style>
    html, body { overflow: hidden; height: 100%; margin: 0; padding: 0; }

    /* ── Layout (mirrors preview.html) ── */
    .share-app {
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
    }
    .topbar {
      display: flex; align-items: center;
      padding: 0 16px; height: 48px; gap: 12px;
      background: var(--brand-bg); color: var(--brand-text);
      flex-shrink: 0; z-index: 10; border-bottom: 1px solid var(--border-color);
    }
    .topbar .brand { font-weight: 700; font-size: 14px; flex-shrink: 0; opacity: 0.85; }
    .topbar .share-title {
      flex: 1; font-size: 14px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      min-width: 0;
    }
    .topbar-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    /* ── Three-column (desktop) ── */
    .share-three-col {
      display: grid;
      grid-template-columns: 240px 1fr 0px;
      flex: 1; min-height: 0; overflow: hidden; width: 100%;
    }
    .share-left {
      border-right: 1px solid var(--border-color);
      background: var(--bg-secondary);
      display: flex; flex-direction: column; overflow: hidden;
      translate: 0;
      transition: translate var(--duration-slow, 0.3s) ease;
    }
    .share-left.hidden { translate: -100%; pointer-events: none; }
    .share-left-header {
      padding: 12px 16px 8px; border-bottom: 1px solid var(--border-color);
      flex-shrink: 0; font-size: 12px; font-weight: 700; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .share-left-header span { flex: 1; }
    .share-left-close {
      background: none; border: none; font-size: 16px; cursor: pointer;
      color: var(--text-secondary); padding: 2px 4px; line-height: 1; border-radius: 4px;
    }
    .share-left-close:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .share-left-body { flex: 1; overflow-y: auto; padding: 8px 0; }

    .share-center {
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--bg-primary); flex: 1; min-height: 0; min-width: 0;
    }
    .share-center-body {
      flex: 1; overflow-y: auto; padding: 20px; min-width: 0;
    }

    /* ── TOC ── */
    .share-toc-list { list-style: none; margin: 0; padding: 0; }
    .share-toc-item { border-radius: 6px; cursor: pointer; }
    .share-toc-item a {
      display: block; padding: 5px 16px; color: var(--text-primary);
      text-decoration: none; border-radius: 6px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; font-size: 13px;
      transition: background 0.12s, color 0.12s;
    }
    .share-toc-item a:hover { background: var(--bg-tertiary); color: var(--accent); }
    .share-toc-item a.toc-active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .share-toc-item.toc-h1 a { padding-left: 16px; font-weight: 600; }
    .share-toc-item.toc-h2 a { padding-left: 28px; }
    .share-toc-item.toc-h3 a { padding-left: 40px; font-size: 12px; }
    .share-toc-item.toc-h4 a { padding-left: 52px; font-size: 12px; color: var(--text-secondary); }
    .share-toc-empty { color: var(--text-muted); font-size: 12px; padding: 20px 16px; text-align: center; }

    /* ── Bottombar ── */
    .share-bottombar {
      height: 40px; background: var(--brand-bg); color: var(--brand-text);
      display: flex; align-items: center; justify-content: center;
      padding: 0 16px; flex-shrink: 0; z-index: 10;
      font-size: 12px; opacity: 0.55;
    }

    /* ── Loading & media ── */
    .share-loading, .share-error { text-align: center; padding: 80px 20px; font-size: 14px; }
    .share-loading { color: var(--text-secondary); }
    .share-error { color: var(--danger); }
    .share-media { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; }
    .share-media img { max-width: 100%; max-height: 70vh; border-radius: 8px; object-fit: contain; }
    .share-media video, .share-media audio { width: 100%; max-width: 600px; }
    .share-media video { max-height: 60vh; border-radius: 8px; background: #000; }
    .share-media audio { margin-top: 16px; }
    .share-media-title { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; word-break: break-all; }

    .markdown-body { background: transparent !important; }

    /* ── Mobile (≤768px) ── */
    @media (max-width: 768px) {
      .topbar { padding: 0 8px; gap: 6px; }
      .topbar .brand { font-size: 0; flex: none; opacity: 1; }
      .topbar-btn { width: 30px; height: 30px; font-size: 13px; }
      .share-three-col { grid-template-columns: 0px 1fr 0px !important; }
      .share-center { grid-column: 2 !important; }
      .share-center-body { padding: 12px; }
      .share-left { transition: none !important; translate: -100% !important; pointer-events: none !important; width: 0 !important; min-width: 0 !important; padding: 0 !important; border-width: 0 !important; overflow: hidden !important; }
      .share-left:not(.hidden) {
        position: fixed; top: 0; bottom: 0; left: 0; z-index: 7;
        display: flex; width: min(260px, 70vw) !important; min-width: 240px !important;
        padding: 48px 0 0 0 !important; border-right: 1px solid var(--border-color) !important;
        translate: 0 !important;
        pointer-events: auto !important; overflow-y: auto !important;
        box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      }
    }
  </style>
</head>
<body>
  <div class="share-app">
    <!-- Topbar -->
    <header class="topbar">
      <span class="brand"><img src="./asset/clawmate-logo.png" alt="" width="24" height="24" style="flex-shrink:0;vertical-align:middle;" />ClawMate</span>
      <span class="share-title" id="shareTitle">📄 加载中...</span>
      <div class="topbar-actions">
        <button class="topbar-btn" id="btnToggleToc" title="切换大纲">📑</button>
        <button class="topbar-btn" id="themeToggle" title="切换主题">🌓</button>
      </div>
    </header>

    <!-- Three-column -->
    <div class="share-three-col" id="shareThreeCol">
      <aside class="share-left hidden" id="shareLeft">
        <div class="share-left-header"><span>📑 大纲</span><button class="share-left-close" id="btnCloseToc" title="关闭大纲">✕</button></div>
        <div class="share-left-body" id="tocBody">
          <div class="share-toc-empty">非 Markdown，无大纲</div>
        </div>
      </aside>
      <main class="share-center">
        <div class="share-center-body" id="contentBody">
          <div class="share-loading">加载中...</div>
        </div>
      </main>
    </div>

    <!-- Bottombar -->
    <div class="share-bottombar">
      <span id="shareExpiry">⏳ -</span>
    </div>
  </div>

  <script src="./vendor/purify.min.js"></script>
  <script src="./vendor/markdown-it.min.js"></script>
  <script src="./vendor/markdown-it-container.min.js"></script>
  <script src="./vendor/markdown-it-emoji.min.js"></script>
  <script src="./vendor/markdown-it-footnote.min.js"></script>
  <script src="./vendor/markdown-it-task-lists.min.js"></script>
  <script src="./vendor/highlight.min.js"></script>
  <script src="./vendor/katex.min.js"></script>
  <script src="./vendor/auto-render.min.js"></script>
  <script src="./vendor/mermaid-v11.min.js"></script>
  <script src="./js/preview-common.js"></script>
  <script>
  (function() {
    'use strict';
    var params = new URLSearchParams(location.search);
    var TOKEN = params.get('token');
    if (!TOKEN) {
      document.getElementById('contentBody').innerHTML = '<div class="share-error">❌ 缺少分享令牌</div>';
      return;
    }

    const API_BASE = '/api/clawmate';
    const body = document.getElementById('contentBody');
    var mermaidStore = [];

    // ── Elements ──
    var tocBtn = document.getElementById('btnToggleToc');
    var shareLeft = document.getElementById('shareLeft');
    var threeCol = document.getElementById('shareThreeCol');
    var tocBody = document.getElementById('tocBody');

    function updateGrid() {
      var hidden = shareLeft.classList.contains('hidden');
      threeCol.style.gridTemplateColumns = (hidden ? '0px' : '240px') + ' 1fr 0px';
    }

    // ── Theme ──
    var theme = localStorage.getItem('clawmate-theme') || 'auto';
    function getResolvedTheme() {
      if (theme === 'auto') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      return theme;
    }
    function applyTheme() {
      var resolved = getResolvedTheme();
      document.documentElement.setAttribute('data-theme', resolved);
      document.body.classList.toggle('dark', resolved === 'dark');
      // Highlight.js theme
      document.getElementById('highlight-theme-css').href = resolved === 'dark'
        ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
        : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
      // Markdown CSS
      document.getElementById('github-markdown-css').href = resolved === 'dark'
        ? './vendor/github-markdown-dark.min.css'
        : './vendor/github-markdown-light.min.css';
      // Button icon
      var btn = document.getElementById('themeToggle');
      if (btn) btn.textContent = theme === 'auto' ? '🌓' : theme === 'light' ? '☀️' : '🌙';
    }
    applyTheme();
    document.getElementById('themeToggle').addEventListener('click', function() {
      if (theme === 'auto') theme = 'light';
      else if (theme === 'light') theme = 'dark';
      else theme = 'auto';
      localStorage.setItem('clawmate-theme', theme);
      applyTheme();
    });

    // ── Slide animation helpers ──
    var _tocTransitioning = false;
    function _onTocTransitionEnd(e) {
      if (e.propertyName !== 'translate') return;
      shareLeft.removeEventListener('transitionend', _onTocTransitionEnd);
      _tocTransitioning = false;
      if (shareLeft.classList.contains('hidden')) {
        shareLeft.style.display = '';             // let global .hidden take over
        updateGrid();                             // grid column → 0px
      }
    }
    function hideTocInstant() {
      // Clean up any in-progress transition and hide immediately (no animation).
      // Used for non-markdown content and mobile heading clicks where a slide-out
      // animation is unnecessary.
      shareLeft.removeEventListener('transitionend', _onTocTransitionEnd);
      _tocTransitioning = false;
      shareLeft.style.display = '';
      shareLeft.classList.add('hidden');
      updateGrid();
      tocBtn.classList.remove('active');
    }
    function openToc() {
      if (!shareLeft.classList.contains('hidden') && !_tocTransitioning) return;
      // Clean up any in-progress close transition
      shareLeft.removeEventListener('transitionend', _onTocTransitionEnd);
      _tocTransitioning = false;
      shareLeft.style.display = 'flex';           // override global .hidden display:none
      // Expand grid column directly while panel is still "hidden"
      threeCol.style.gridTemplateColumns = '240px 1fr 0px';
      shareLeft.offsetHeight;                     // reflow: w=240, translateX(-240px)
      shareLeft.classList.remove('hidden');       // slide-in: -100% → 0
      shareLeft.style.display = '';
      tocBtn.classList.add('active');
    }
    function closeToc() {
      if (shareLeft.classList.contains('hidden') && !_tocTransitioning) return;
      shareLeft.style.display = 'flex';           // override global .hidden display:none
      shareLeft.addEventListener('transitionend', _onTocTransitionEnd);
      _tocTransitioning = true;
      shareLeft.classList.add('hidden');          // slide-out: 0 → -100%
      tocBtn.classList.remove('active');
    }

    // ── TOC toggle ──
    tocBtn.addEventListener('click', function() {
      if (shareLeft.classList.contains('hidden')) {
        openToc();
      } else {
        closeToc();
      }
    });
    tocBtn.classList.toggle('active', !shareLeft.classList.contains('hidden'));

    // ── TOC close button ──
    document.getElementById('btnCloseToc').addEventListener('click', function() {
      closeToc();
    });

    // ── Markdown renderer ──
    var md = window.markdownit({ html: true, linkify: true, typographer: true, breaks: true });
    md.use(window.markdownitContainer, 'note');
    md.use(window.markdownitContainer, 'warning');
    md.use(window.markdownitContainer, 'tip');
    md.use(window.markdownitEmoji);
    md.use(window.markdownitFootnote);
    md.use(window.markdownitTaskLists, { enabled: true, label: true, labelAfter: true });

    // Rewrite relative image paths → share asset endpoint
    var _shareRoot = '', _shareFile = '';
    md.renderer.rules.image = function(tokens, idx) {
      var token = tokens[idx];
      var src = token.attrGet('src') || '';
      var alt = token.content || '';
      var title = token.attrGet('title') || '';
      if (!/^https?:\/\//i.test(src) && !src.startsWith('/')) {
        var dir = _shareFile.includes('/') ? _shareFile.split('/').slice(0, -1).join('/') : '';
        var full = dir ? dir + '/' + src : src;
        src = API_BASE + '/share/' + TOKEN + '/asset?root=' + encodeURIComponent(_shareRoot) + '&path=' + encodeURIComponent(full);
      }
      return '<img src="' + src + '" alt="' + (alt || '') + '"' + (title ? ' title="' + title + '"' : '') + ' onerror="this.style.display=\'none\'">';
    };

    md.renderer.rules.fence = function(tokens, idx) {
      var token = tokens[idx];
      var language = token.info.trim();
      var raw = token.content;
      if (language === 'mermaid') {
        var id = mermaidStore.length;
        mermaidStore.push(raw);
        return '<div class="mermaid" data-mermaid-id="' + id + '"></div>';
      }
      var cls = language ? 'language-' + language : '';
      if (language) {
        try {
          var langMap = { yml:'yaml', node:'javascript', py:'python', sh:'bash', markdown:'md', text:'plaintext' };
          var nl = langMap[language.toLowerCase()] || language;
          if (window.hljs && window.hljs.getLanguage && window.hljs.getLanguage(nl)) {
            return '<pre><code class="' + cls + '">' + window.hljs.highlight(raw.replace(/<[^>]*>/g, ''), { language: nl, ignoreIllegals: true }).value + '</code></pre>';
          }
        } catch(e) {}
      }
      return '<pre><code class="' + cls + '">' + md.utils.escapeHtml(raw) + '</code></pre>';
    };

    // Rewrite relative markdown links to ClawMate preview URLs
    var _defaultLinkOpen = md.renderer.rules.link_open || function(tokens, idx, options, env, slf) {
      return slf.renderToken(tokens, idx, options);
    };
    md.renderer.rules.link_open = function(tokens, idx, options, env, slf) {
      var token = tokens[idx];
      var href = token.attrGet('href') || '';
      if (href && !/^https?:\/\//i.test(href) && !href.startsWith('/') && !href.startsWith('#')) {
        var dir = (_shareFile || '').includes('/') ? _shareFile.split('/').slice(0, -1).join('/') : '';
        var fullPath = dir ? dir + '/' + href : href;
        href = 'preview.html?root=' + encodeURIComponent(_shareRoot) + '&file=' + encodeURIComponent(fullPath);
        token.attrSet('href', href);
      }
      return _defaultLinkOpen(tokens, idx, options, env, slf);
    };

    function buildTOC(mdDiv) {
      var headings = mdDiv.querySelectorAll('h1,h2,h3,h4');
      if (headings.length < 2) {
        closeToc();
        return;
      }
      // Keep hidden by default on mobile
      if (window.innerWidth >= 768) {
        openToc();
        tocBtn.classList.add('active');
      }
      headings.forEach(function(heading, i) { if (!heading.id) heading.id = 'share-h-' + i; });
      var list = document.createElement('ul');
      list.className = 'share-toc-list';
      headings.forEach(function(heading) {
        var level = parseInt(heading.tagName[1]);
        var li = document.createElement('li');
        li.className = 'share-toc-item toc-h' + level;
        var a = document.createElement('a');
        a.href = '#' + heading.id;
        a.textContent = heading.textContent;
        a.addEventListener('click', function(ev) {
          ev.preventDefault();
          if (window.innerWidth < 768) { hideTocInstant(); }
          var ct = document.getElementById('contentBody');
          var hTop = heading.getBoundingClientRect().top;
          var cTop = ct.getBoundingClientRect().top;
          ct.scrollTo({ top: hTop - cTop + ct.scrollTop - 20, behavior: 'smooth' });
        });
        li.appendChild(a);
        list.appendChild(li);
      });
      tocBody.innerHTML = ''; tocBody.appendChild(list);

      // Active highlight via IntersectionObserver (one observer for all)
      if (typeof IntersectionObserver !== 'undefined' && headings.length) {
        var links = list.querySelectorAll('a');
        var activeLink = null;
        var observer = new IntersectionObserver(function(entries) {
          var visible = entries.filter(function(e) { return e.isIntersecting; })
            .sort(function(a, b) { return a.boundingClientRect.top - b.boundingClientRect.top; });
          if (visible.length) {
            var link = list.querySelector('a[href="#' + visible[0].target.id + '"]');
            if (link && link !== activeLink) {
              if (activeLink) activeLink.classList.remove('toc-active');
              link.classList.add('toc-active');
              activeLink = link;
            }
          }
        }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });
        headings.forEach(function(heading) { observer.observe(heading); });
      }
    }

    function renderMarkdown(content) {
      var html = md.render(content);
      body.innerHTML = '<div class="markdown-body">' + html + '</div>';
      var mdDiv = body.querySelector('.markdown-body');
      buildTOC(mdDiv);

      if (window.mermaid && mermaidStore.length) {
        try {
          var blocks = mdDiv.querySelectorAll('.mermaid');
          blocks.forEach(function(b) {
            var id = b.getAttribute('data-mermaid-id');
            if (id != null && mermaidStore[id]) b.textContent = mermaidStore[id];
          });
          window.mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: getResolvedTheme() === 'dark' ? 'dark' : 'default' });
          window.mermaid.run({ querySelector: '.share-center .mermaid' }).catch(function(){});
        } catch(e) {}
      }
      if (window.renderMathInElement) {
        try { renderMathInElement(mdDiv, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}] }); } catch(e) {}
      }
      if (window.hljs && window.hljs.highlightElement) {
        mdDiv.querySelectorAll('pre code:not(.hljs)').forEach(function(b) { try { window.hljs.highlightElement(b); } catch(e) {} });
      }
      mdDiv.querySelectorAll('a[href^="http"]').forEach(function(a) {
        a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener');
      });
      // Internal ClawMate links stay in same tab
      mdDiv.querySelectorAll('a[href*="preview.html?root="]').forEach(function(a) {
        a.setAttribute('target', '_self');
      });
    }

    function renderPlainText(content) {
      var pre = document.createElement('pre');
      pre.style.cssText = 'margin:0;padding:16px;overflow-x:auto;font-size:14px;white-space:pre-wrap;word-break:break-word;border-radius:8px;background:var(--bg-code);color:var(--text-primary);';
      pre.textContent = content;
      body.innerHTML = ''; body.appendChild(pre);
    }

    async function loadContent() {
      try {
        var res = await fetch(API_BASE + '/share/' + TOKEN + '/data');
        if (!res.ok) {
          body.innerHTML = '<div class="share-error">❌ ' + (res.status === 410 ? '链接已过期' : '加载失败 (' + res.status + ')') + '</div>';
          return;
        }
        var data = await res.json();
        // Store root/file for image path rewriting
        _shareRoot = data.root || '';
        _shareFile = data.path || '';
        document.getElementById('shareExpiry').textContent = data.expires_str ? '⏳ ' + data.expires_str + ' 前有效' : '⏳ -';

        var ext = data.suffix ? data.suffix.replace('.','').toLowerCase() : '';
        var pageTitle = data.name;
        if ((ext === 'md' || ext === 'markdown') && data.content) {
          var m = data.content.match(/^#\s+(.+)$/m);
          if (m) pageTitle = m[1].trim();
        }
        document.title = pageTitle + ' · ClawMate 分享';
        document.getElementById('shareTitle').textContent = pageTitle;

        var IMG = ['png','jpg','jpeg','svg','webp','gif','bmp','ico'];
        var AUD = ['mp3','wav','ogg','flac','aac','m4a','wma'];
        var VID = ['mp4','webm','mov','avi','mkv','wmv','flv','m4v'];
        var DOC = ['doc','docx','xls','xlsx','ppt','pptx','odt','ods','odp','pdf'];

        if (IMG.includes(ext)) {
          hideTocInstant();
          body.innerHTML = '<div class="share-media"><div class="share-media-title">' + data.name + '</div><img src="' + API_BASE + '/share/' + TOKEN + '/raw" alt="' + data.name + '" /></div>';
        } else if (AUD.includes(ext)) {
          hideTocInstant();
          body.innerHTML = '<div class="share-media"><div class="share-media-title">' + data.name + '</div><audio src="' + API_BASE + '/share/' + TOKEN + '/raw" controls preload="metadata" style="width:100%;max-width:600px;"></audio></div>';
        } else if (VID.includes(ext)) {
          hideTocInstant();
          body.innerHTML = '<div class="share-media"><div class="share-media-title">' + data.name + '</div><video src="' + API_BASE + '/share/' + TOKEN + '/raw" controls preload="metadata" style="width:100%;max-height:60vh;border-radius:8px;background:#000;"></video></div>';
        } else if (DOC.includes(ext)) {
          hideTocInstant();
          body.innerHTML = '<div class="share-media" style="gap:16px;"><div style="font-size:48px;opacity:0.5;">📄</div><div class="share-media-title">' + data.name + '</div><div style="font-size:13px;color:var(--text-muted);">桌面版可预览 Office/PDF 文件</div></div>';
        } else if (ext === 'md' || ext === 'markdown') {
          renderMarkdown(data.content || '');
        } else if (ext === 'html' || ext === 'htm') {
          hideTocInstant();
          var iframe = document.createElement('iframe');
          iframe.style.cssText = 'width:100%;height:100%;border:none;background:#fff;';
          iframe.srcdoc = data.content || '';
          body.innerHTML = '';
          body.appendChild(iframe);
        } else {
          hideTocInstant();
          renderPlainText(data.content || '');
        }
      } catch(e) {
        body.innerHTML = '<div class="share-error">❌ 加载出错: ' + e.message + '</div>';
      }
    }
    loadContent();
  })();
  </script>
</body>
</html>
