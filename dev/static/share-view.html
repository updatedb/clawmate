<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="data:," />
  <title>分享 · ClawMate</title>
  <link rel="stylesheet" href="/clawmate/m/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="highlight-theme-css" />
  <link rel="stylesheet" href="/clawmate/vendor/github-markdown-dark.min.css" id="github-markdown-css" />
  <link rel="stylesheet" href="/clawmate/vendor/katex.min.css" />
  <style>
    .share-loading { text-align: center; padding: 48px 16px; color: var(--text-muted); font-size: 15px; }
    .share-error { text-align: center; padding: 48px 16px; color: var(--danger); font-size: 15px; }
    .share-bottombar {
      height: var(--bottombar); min-height: var(--bottombar);
      display: flex; align-items: center; padding: 0 12px; padding-bottom: var(--safe-bottom);
      background: var(--brand-bg); color: var(--brand-text); font-size: 12px;
      border-top: 1px solid var(--border);
      position: relative;
    }
    .share-bottombar .share-toc-btn { font-size: 18px; line-height: 1; opacity: 0.8; padding: 2px 6px; border-radius: 6px; transition: background 0.15s; cursor:pointer; user-select:none; position: absolute; left: 12px; z-index: 1; }
    .share-bottombar .share-toc-btn:hover { background: rgba(255,255,255,0.12); }
    .share-bottombar .share-brand { flex: 1; text-align: center; opacity: 0.4; font-size: 11px; }
    .share-bottombar .share-expiry { position: absolute; right: 12px; opacity: 0.5; font-size: 11px; }
    .share-toc-panel {
      position: fixed; bottom: var(--bottombar); left: 0; right: 0;
      background: var(--bg); border-top: 1px solid var(--border);
      z-index: 50;
      overflow-y: auto;
      max-height: 0;
      transition: max-height 0.25s ease;
    }
    .share-toc-panel.open { max-height: 50vh; }
    .share-topbar {
      display: flex; align-items: center; padding: 0 12px;
      height: var(--topbar); min-height: var(--topbar);
      padding-top: var(--safe-top);
      background: var(--brand-bg); color: var(--brand-text); gap: 8px;
    }
    .share-topbar .share-title { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .m-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .m-content .markdown-body { background: transparent !important; }
    .m-content .markdown-body pre { overflow-x: auto; max-width: 100%; }
    .m-content .markdown-body table { display: block; overflow-x: auto; max-width: 100%; }
    .m-content .markdown-body img { max-width: 100%; height: auto; }
    .m-content .markdown-body svg { max-width: 100%; height: auto; }
    .share-media-wrapper {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 16px; flex: 1;
    }
    .share-media-wrapper img { max-width: 100%; max-height: 70vh; border-radius: 8px; object-fit: contain; }
    .share-media-wrapper video, .share-media-wrapper audio { width: 100%; max-width: 600px; }
    .share-media-wrapper video { max-height: 60vh; border-radius: 8px; background: #000; }
    .share-media-wrapper audio { margin-top: 16px; }
    .share-media-title { text-align: center; font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="m-app">
    <div class="share-topbar"><span class="share-title" id="shareTitle">📄 分享</span></div>
    <div class="m-content" id="contentBody"><div class="share-loading">加载中...</div></div>
    <div class="share-bottombar">
      <span class="share-toc-btn" id="shareTocBtn" style="display:none;">📋大纲</span>
      <span class="share-brand">ClawMate</span>
      <span class="share-expiry" id="shareExpiry">⏳ -</span>
    </div>
    <div class="share-toc-panel" id="shareTocPanel"></div>
  </div>

  <script src="/clawmate/vendor/mermaid-v11.min.js"></script>
  <script src="/clawmate/vendor/markdown-it.min.js"></script>
  <script src="/clawmate/vendor/markdown-it-container.min.js"></script>
  <script src="/clawmate/vendor/markdown-it-emoji.min.js"></script>
  <script src="/clawmate/vendor/markdown-it-footnote.min.js"></script>
  <script src="/clawmate/vendor/markdown-it-task-lists.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
  (function() {
    'use strict';
    var params = new URLSearchParams(location.search);
    var TOKEN = params.get('token');
    if (!TOKEN) {
      document.getElementById('contentBody').innerHTML = '<div class="share-error">❌ 缺少分享令牌</div>';
      return;
    }

    const API_BASE = '/api/clawmate';
    const body = document.getElementById('contentBody');
    const MARKDOWN_EXTS = ['md', 'markdown'];
    const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'svg', 'webp', 'gif', 'bmp', 'ico'];
    const AUDIO_EXTS = ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a', 'wma'];
    const VIDEO_EXTS = ['mp4', 'webm', 'mov', 'avi', 'mkv', 'wmv', 'flv', 'm4v'];
    const OFFICE_EXTS = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'odt', 'ods', 'odp'];

    let mermaidStore = [];

    const md = window.markdownit({
      html: true, linkify: true, typographer: true, breaks: true,
    });
    md.use(window.markdownitContainer, 'note');
    md.use(window.markdownitContainer, 'tip');
    md.use(window.markdownitContainer, 'warn');
    md.use(window.markdownitContainer, 'danger');
    md.use(window.markdownitFootnote);
    md.use(window.markdownitTaskLists, { enabled: true, label: true, labelAfter: true });

    // Override fence renderer for mermaid + highlight.js
    md.renderer.rules.fence = function(tokens, idx, options, env, slf) {
      var token = tokens[idx];
      var language = token.info.trim();
      var raw = token.content;
      var cls = language ? 'language-' + language : '';

      if (language === 'mermaid') {
        var id = mermaidStore.length;
        mermaidStore.push(raw);
        return '<div class="mermaid" data-mermaid-id="' + id + '"></div>';
      }

      if (language && hljs.getLanguage(language)) {
        try {
          var langMap = { yml: 'yaml', node: 'javascript', py: 'python', sh: 'bash', text: 'plaintext' };
          var normalLang = langMap[language.toLowerCase()] || language;
          var plain = raw.replace(/<[^>]*>/g, '');
          var highlighted = hljs.highlight(plain, { language: normalLang, ignoreIllegals: true }).value;
          return '<pre class="hljs" style="overflow-x:auto;max-width:100%;padding:12px;border-radius:8px;background:var(--code-bg);"><code class="' + cls + '">' + highlighted + '</code></pre>';
        } catch(e) {}
      }
      return '<pre style="overflow-x:auto;max-width:100%;padding:12px;border-radius:8px;background:var(--code-bg);"><code class="' + cls + '">' + md.utils.escapeHtml(raw) + '</code></pre>';
    };

    function renderMarkdown(content) {
      body.innerHTML = '<div class="markdown-body">' + md.render(content) + '</div>';
      rebuildTOC(body.querySelector('.markdown-body'));
      if (window.mermaid && mermaidStore.length > 0) {
        try {
          var blocks = document.querySelectorAll('.markdown-body .mermaid');
          blocks.forEach(function(b) {
            var id = b.getAttribute('data-mermaid-id');
            if (id != null && mermaidStore[id]) b.textContent = mermaidStore[id];
          });
          window.mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: 'dark' });
          (async function() {
            try { await window.mermaid.run({ querySelector: '.markdown-body .mermaid' }); }
            catch(e) { console.warn('Mermaid run error:', e); }
          })();
        } catch(e) { console.warn('Mermaid init error:', e); }
      }
      try {
        renderMathInElement(body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
          ], throwOnError: false
        });
      } catch(e) {}
      body.querySelectorAll('pre code:not(.hljs)').forEach(function(b) { hljs.highlightElement(b); });
      body.querySelectorAll('a[href^="http"]').forEach(function(a) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener');
      });
    }

    function renderPlainText(content) {
      var pre = document.createElement('pre');
      pre.style.cssText = 'padding:16px;margin:0;overflow-x:auto;font-size:14px;white-space:pre-wrap;word-break:break-word;line-height:1.6;color:var(--text);';
      pre.textContent = content;
      body.innerHTML = '';
      body.appendChild(pre);
    }

    var _tocList = null;
    function rebuildTOC(mdDiv) {
      _tocList = null;
      var tocBtn = document.getElementById('shareTocBtn');
      var tocPanel = document.getElementById('shareTocPanel');
      if (tocBtn) tocBtn.style.display = 'none';
      if (tocPanel) tocPanel.classList.remove('open');
      if (!mdDiv) return;
      var headings = mdDiv.querySelectorAll('h1, h2, h3, h4');
      if (headings.length < 2) return;
      headings.forEach(function(h, i) { if (!h.id) h.id = 'share-heading-' + i; });

      var list = document.createElement('ul');
      list.style.cssText = 'padding:8px 12px;margin:0;list-style:none;max-height:50vh;overflow-y:auto;';
      headings.forEach(function(h) {
        var level = parseInt(h.tagName[1]);
        var li = document.createElement('li');
        li.style.cssText = 'padding:3px 0 3px ' + ((level - 1) * 16) + 'px;';
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.style.cssText = 'color:var(--text-secondary);text-decoration:none;cursor:pointer;display:block;padding:3px 8px;border-radius:4px;font-size:13px;';
        a.addEventListener('mouseenter', function() { this.style.background = 'var(--bg-hover)'; });
        a.addEventListener('mouseleave', function() { this.style.background = 'transparent'; });
        a.addEventListener('click', function(e) {
          e.preventDefault();
          h.scrollIntoView({ behavior: 'smooth', block: 'start' });
          var panel = document.getElementById('shareTocPanel');
          if (panel) panel.classList.remove('open');
          var btn = document.getElementById('shareTocBtn');
          if (btn) btn.textContent = '📋大纲';
        });
        li.appendChild(a);
        list.appendChild(li);
      });
      _tocList = list;
      var panel = document.getElementById('shareTocPanel');
      if (panel) {
        panel.innerHTML = '';
        panel.appendChild(list);
      }
      var btn = document.getElementById('shareTocBtn');
      if (btn) btn.style.display = '';
    }

    function setupTocToggle() {
      var btn = document.getElementById('shareTocBtn');
      var panel = document.getElementById('shareTocPanel');
      if (!btn || !panel) return;
      btn.addEventListener('click', function() {
        var open = panel.classList.toggle('open');
        btn.textContent = open ? '📋大纲 ▲' : '📋大纲';
        if (open && _tocList) {
          panel.innerHTML = '';
          panel.appendChild(_tocList);
        }
      });
    }

    async function loadContent() {
      try {
        var res = await fetch(API_BASE + '/share/' + TOKEN + '/data');
        if (!res.ok) {
          body.innerHTML = '<div class="share-error">❌ ' + (res.status === 410 ? '链接已过期' : '加载失败 (' + res.status + ')') + '</div>';
          return;
        }
        var data = await res.json();

        // Update expiry time
        var expiryEl = document.getElementById('shareExpiry');
        if (expiryEl && data.expires_str) {
          expiryEl.textContent = '⏳ 有效期 ' + data.expires_str;
        }

        var ext = data.suffix ? data.suffix.replace('.','').toLowerCase() : '';
        // 提取标题：Markdown 取第一个 # heading，其余用文件名
        var pageTitle = data.name;
        if ((ext === 'md' || ext === 'markdown') && data.content) {
          var m = data.content.match(/^#\s+(.+)$/m);
          if (m) pageTitle = m[1].trim();
        }
        document.title = pageTitle + ' · ClawMate 分享';
        document.getElementById('shareTitle').textContent = '📄 ' + pageTitle;

        if (IMAGE_EXTS.includes(ext)) {
          body.innerHTML = '<div class="share-media-wrapper"><div class="share-media-title">' + data.name + '</div><img src="' + API_BASE + '/share/' + TOKEN + '/raw" alt="' + data.name + '" /></div>';
        } else if (AUDIO_EXTS.includes(ext)) {
          body.innerHTML = '<div class="share-media-wrapper"><div class="share-media-title">' + data.name + '</div><audio src="' + API_BASE + '/share/' + TOKEN + '/raw" controls preload="metadata" style="width:100%;max-width:600px;"></audio></div>';
        } else if (VIDEO_EXTS.includes(ext)) {
          body.innerHTML = '<div class="share-media-wrapper"><div class="share-media-title">' + data.name + '</div><video src="' + API_BASE + '/share/' + TOKEN + '/raw" controls preload="metadata" style="width:100%;max-height:60vh;border-radius:8px;background:#000;"></video></div>';
        } else if (OFFICE_EXTS.includes(ext) || ext === 'pdf') {
          body.innerHTML = '<div class="share-media-wrapper" style="gap:16px;"><div style="font-size:48px;opacity:0.5;">📄</div><div class="share-media-title">' + data.name + '</div><div style="font-size:13px;color:var(--text-muted);">桌面版可预览 Office/PDF 文件</div></div>';
        } else if (MARKDOWN_EXTS.includes(ext)) {
          renderMarkdown(data.content || '');
        } else {
          renderPlainText(data.content || '');
        }
      } catch(e) {
        body.innerHTML = '<div class="share-error">❌ 加载出错: ' + e.message + '</div>';
      }
    }
    loadContent();
    setupTocToggle();
  })();
  </script>
</body>
</html>
