<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #525659; }
    #container { width: 100%; height: 100%; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
    .page { margin: 10px auto; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.5); flex-shrink: 0; }
    canvas { display: block; }
    .textLayer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      line-height: 1;
      text-size-adjust: none;
      forced-color-adjust: none;
      transform-origin: 0 0;
      z-index: 1;
      user-select: text;
    }
    .textLayer span,
    .textLayer br {
      color: transparent;
      position: absolute;
      white-space: pre;
      cursor: text;
      transform-origin: 0% 0%;
    }
    .textLayer ::selection { background: rgba(0, 96, 255, 0.25); }
    .error { color: #f8b4b4; text-align: center; padding: 40px 20px; font-family: sans-serif; }
    .loading { color: #ccc; text-align: center; padding: 40px 20px; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="container"></div>
  <script src="/clawmate/pdfjs/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = '/clawmate/pdfjs/pdf.worker.min.js';

    const params = new URLSearchParams(window.location.search);
    const fileUrl = params.get('file');
    const container = document.getElementById('container');
    const minScale = 0.5;
    const maxScale = 3;
    const scaleStep = 0.25;
    let pdfDocument = null;
    let pageScale = 1.5;
    let pendingPage = null;

    function scrollToPage(pageNum) {
      pendingPage = pageNum;
      const target = document.getElementById('pdf-page-' + pageNum);
      if (!target) return;
      pendingPage = null;
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function notifyScaleChange() {
      window.parent.postMessage({ type: 'pdf-scale-change', scale: pageScale }, '*');
    }

    window.addEventListener('message', function(e) {
      if (!e.data) return;
      if (e.data.type === 'scroll-to-page') {
        scrollToPage(e.data.page);
      } else if (e.data.type === 'zoom-pdf') {
        const delta = Number(e.data.delta) || 0;
        const nextScale = Math.min(maxScale, Math.max(minScale, pageScale + delta * scaleStep));
        if (nextScale !== pageScale) {
          pageScale = nextScale;
          notifyScaleChange();
          if (pdfDocument) renderPdf(pdfDocument);
        }
      }
    });

    async function renderPdf(pdf) {
      container.innerHTML = '<div class="loading">加载中...</div>';
      const pages = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        pages.push(pdf.getPage(i));
      }
      const loadedPages = await Promise.all(pages);
      container.innerHTML = '';
      const devicePixelRatio = Math.min(Math.max(window.devicePixelRatio || 1, 2), 3);
      const renderScale = pageScale * devicePixelRatio;
      await Promise.all(loadedPages.map(async function(page, idx) {
        const viewport = page.getViewport({ scale: pageScale });
        const renderViewport = page.getViewport({ scale: renderScale });
        const canvas = document.createElement('canvas');
        canvas.width = renderViewport.width;
        canvas.height = renderViewport.height;
        canvas.style.width = viewport.width + 'px';
        canvas.style.height = viewport.height + 'px';
        const ctx = canvas.getContext('2d');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.id = 'pdf-page-' + (idx + 1);
        pageDiv.style.width = viewport.width + 'px';
        pageDiv.style.height = viewport.height + 'px';
        pageDiv.appendChild(canvas);

        const textLayer = document.createElement('div');
        textLayer.className = 'textLayer';
        textLayer.style.setProperty('--scale-factor', viewport.scale);
        pageDiv.appendChild(textLayer);
        container.appendChild(pageDiv);

        const textContent = await page.getTextContent();
        const textLayerTask = pdfjsLib.renderTextLayer({
          textContentSource: textContent,
          container: textLayer,
          viewport: viewport,
        });
        await Promise.all([
          page.render({ canvasContext: ctx, viewport: renderViewport }).promise,
          textLayerTask.promise,
        ]);
      }));
      if (pendingPage) scrollToPage(pendingPage);
    }

    if (!fileUrl) {
      container.innerHTML = '<div class="error">缺少 file 参数</div>';
    } else {
      container.innerHTML = '<div class="loading">加载中...</div>';

      pdfjsLib.getDocument({
        url: fileUrl,
        cMapUrl: '/clawmate/pdfjs/cmaps/',
        cMapPacked: true,
        standardFontDataUrl: '/clawmate/pdfjs/standard_fonts/'
      }).promise.then(function(pdf) {
        pdfDocument = pdf;
        return renderPdf(pdf);
      }).catch(function(err) {
        container.innerHTML = '<div class="error">无法加载 PDF: ' + (err.message || err) + '</div>';
      });
    }
  </script>
</body>
</html>
