<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>预览 — ClawMate</title>
  <link rel="stylesheet" href="./css/style.css?v=20260604a" />
  <link rel="stylesheet" href="./vendor/github-markdown-light.min.css" id="github-markdown-css" />
  <link rel="stylesheet" href="./vendor/katex.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="highlight-theme-css" />
  <style>
    /* ===== v1.10 P0 mobile patches ===== */
    :root {
      /* Bootstrap-aligned breakpoints (D4) */
      --bp-phone: 576px;
      --bp-tablet: 768px;
      --bp-desktop: 992px;
      /* Safe-area insets (D3) - fallback to 0 in non-supporting browsers;
         fixed bottom/top elements use max(12px, env(...)) pattern. */
      --sai-top: env(safe-area-inset-top, 0px);
      --sai-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ===== Preview-specific overrides ===== */

    /* Scrollbar styling — matches modal / main site aesthetic */

    .preview-app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Three-column grid */
    .preview-three-col {
      display: grid;
      grid-template-columns: 240px 1fr 300px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      width: 100%;
    }

    /* Left sidebar */
    .preview-left {
      border-right: 1px solid var(--border-color);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
    }
    .preview-left.hidden {
      width: 0;
      padding: 0;
      opacity: 0;
      overflow: hidden;
      border: none;
    }
    .preview-left-header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .preview-left-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    /* TOC list */
    .preview-toc-list { list-style: none; margin: 0; padding: 0; }
    .preview-toc-item { border-radius: var(--radius-sm); cursor: pointer; }
    .preview-toc-item a {
      display: block;
      padding: 5px 16px;
      color: var(--text-primary);
      text-decoration: none;
      border-radius: var(--radius-sm);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      transition: background 0.12s, color 0.12s;
    }
    .preview-toc-item a:hover { background: var(--bg-tertiary); color: var(--accent); }
    .preview-toc-item a.toc-active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .preview-toc-item.toc-h1 a { padding-left: 16px; font-weight: 600; }
    .preview-toc-item.toc-h2 a { padding-left: 28px; }
    .preview-toc-item.toc-h3 a { padding-left: 40px; font-size: 12px; }
    .preview-toc-item.toc-h4 a { padding-left: 52px; font-size: 12px; color: var(--text-secondary); }
    .preview-toc-item.toc-code a {
      padding-left: 16px;
      font-family: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-toc-empty {
      color: var(--text-muted);
      font-size: 12px;
      padding: 20px 16px;
      text-align: center;
    }

    /* Center content area */
    .preview-center {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
      flex: 1;
      min-height: 0;
    }
    .preview-center-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    /* Right sidebar — feedback panel */
    .preview-right {
      border-left: 1px solid var(--border-color);
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
    }
    .preview-right.hidden {
      width: 0;
      padding: 0;
      opacity: 0;
      overflow: hidden;
      border: none;
    }
    .preview-right-header {
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .preview-right-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .fb-section-sep {
      display: flex;
      align-items: center;
      margin: 8px 8px 4px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .fb-section-sep::before,
    .fb-section-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    .fb-section-sep span { padding: 0 8px; }

    /* Feedback cards */
    .fb-card,
    .feedback-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      padding: 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      margin-bottom: 8px;
    }
    .fb-card > * + *,
    .feedback-card > * + * {
      margin-top: 8px;
    }
    .fb-card .fb-btn-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--danger-border);
      background: var(--btn-bg);
      cursor: pointer;
      font-size: 12px;
      color: var(--danger);
      line-height: 1;
    }
    .fb-card .fb-btn-delete:hover { background: var(--danger-bg); border-color: var(--danger); }
    .fb-card .fb-btn-submit {
      margin-left: auto;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--accent);
      background: var(--accent);
      cursor: pointer;
      font-size: 11px;
      color: #fff;
      font-weight: 500;
    }
    .fb-card .fb-btn-submit:hover { opacity: 0.9; }
    .fb-card:hover { border-color: var(--text-muted); box-shadow: var(--card-shadow); }
    .fb-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); background: var(--bg-secondary); }
    .fb-card-header { display: flex; align-items: center; gap: 6px; }
    .fb-card-status { font-size: 14px; flex-shrink: 0; }
    .fb-card-id { font-family: monospace; font-size: 11px; color: var(--text-secondary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fb-card-time { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    .fb-card-note {
      color: var(--text-primary);
      font-size: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-all;
    }
    .fb-card-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    /* Feedback note input */
    .fb-note-input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-code);
      color: var(--text-primary);
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      line-height: 1.5;
      box-sizing: border-box;
    }
    .fb-note-input:focus { outline: none; border-color: var(--accent); }


    .fb-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 30px 12px;
    }
    /* Bottom toolbar */
    .preview-bottombar {
      height: 48px;
      background: var(--brand-bg);
      color: var(--brand-text);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 12px;
      flex-shrink: 0;
      z-index: 10;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.2);
    }
    .preview-bottom-btn {
      height: 36px;
      padding: 0 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: var(--brand-text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s;
      white-space: nowrap;
      box-sizing: border-box;
    }
    .preview-bottom-btn:hover { background: rgba(255,255,255,0.16); }
    .preview-bottom-btn.active { background: var(--accent); border-color: var(--accent); }
    .preview-bottom-btn.danger:hover { background: rgba(220,38,38,0.3); border-color: rgba(220,38,38,0.5); }
    .preview-bottom-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .preview-bottom-btn:disabled:hover { background: rgba(255,255,255,0.08); }
    .img-nav-counter {
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      height: 36px;
      color: var(--brand-text, #e5e7eb);
      font-size: 12px;
      font-family: monospace;
      white-space: nowrap;
      opacity: 0.85;
    }
    .preview-bottom-divider { width: 1px; height: 20px; background: transparent; margin: 0 4px; flex-shrink: 0; }

    /* Toast */
    .preview-toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-secondary);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 9999;
      font-size: 13px;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    /* Content area title */
    .preview-doc-title {
      font-size: 1.5em;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border-color);
    }

    /* Loading / error states */
    .preview-loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* Ensure markdown body background is transparent so page bg shows through */
    .markdown-body {
      background: transparent !important;
    }
    .preview-error {
      text-align: center;
      padding: 80px 20px;
      color: var(--danger);
      font-size: 14px;
    }

    /* Selection tooltip */
    .preview-selection-tooltip {
      position: fixed;
      z-index: 9999;
      width: min(400px, calc(100vw - 20px));
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      padding: 16px;
      font-size: 13px;
      display: none;
      flex-direction: column;
      gap: 12px;
      animation: feedback-in 0.15s ease-out;
    }

    /* Selection tooltip: editable position input in raw/text mode */

    .pst-btn-add {
      flex: 1;
      padding: 9px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .pst-btn-add:hover { background: var(--border-color); }

    /* ===== Responsive (v1.10 D4: 900px → Bootstrap tablet 767.98px) ===== */
    @media (max-width: 767.98px) {
      .preview-three-col {
        grid-template-columns: 1fr;
        position: relative;
      }
      .preview-left, .preview-right {
        position: fixed;
        top: 48px;
        bottom: 48px;
        z-index: 50;
        width: 280px;
        transform: translateX(-100%);
        opacity: 0;
        pointer-events: none;
      }
      .preview-left { left: 0; }
      .preview-right { right: 0; transform: translateX(100%); }
      .preview-left:not(.hidden), .preview-right:not(.hidden) {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }
      .preview-center-body { padding: 16px 20px; }
    }

    /* ===== v1.10 D2: Sidebar mask overlay + content shift =====
       When a sidebar opens on mobile, a translucent mask covers the
       rest of the page; the center column shrinks so the content is
       not occluded. Transitions smooth both effects in 200ms. */
    .preview-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 49; /* below .preview-left/right (50), above content */
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .preview-mask.active { display: block; opacity: 1; }

    /* Content shift - applied on the .preview-three-col when a sidebar is open
       so the .preview-center column auto-narrows. */
    .preview-three-col {
      transition: margin 0.2s ease;
    }
    @media (min-width: 768px) {
      /* Desktop: legacy grid behavior - center never shifts for sidebars. */
      .preview-three-col.sidebar-left-open .preview-center { margin-left: 0; }
      .preview-three-col.sidebar-right-open .preview-center { margin-right: 0; }
    }
    @media (max-width: 767.98px) {
      .preview-three-col.sidebar-left-open .preview-center { margin-left: 280px; }
      .preview-three-col.sidebar-right-open .preview-center { margin-right: 280px; }
    }

    /* ===== v1.10 D3: Safe-area inset handling for fixed top/bottom =====
       Pattern: padding-bottom: max(12px, env(safe-area-inset-bottom))
       Works on iOS (notch/home indicator) and Android (gesture nav).
       Old 48px-tall bars get a small extra breathing room. */
    .topbar {
      padding-top: max(12px, env(safe-area-inset-top, 12px));
    }
    .preview-bottombar {
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
    }
    /* Inherit safe-area padding for any dynamic content added to bottombar
       (e.g. image/audio controls in #bottombarDynamic) */
    #bottombarDynamic {
      padding-bottom: max(0px, env(safe-area-inset-bottom, 0px));
    }
    /* Standalone index page bottom nav (defined in style.css; safe-area
       re-applied here for preview.html's import context). */
    .index-bottom-nav {
      padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
    }

    /* v1.10 D3: Android low-end fallback - if the browser does not
       support the env() function, ensure fixed bars get at least 12px
       breathing room above the home indicator. */
    @supports not (padding-top: env(safe-area-inset-top)) {
      .topbar { padding-top: 12px; }
      .preview-bottombar { padding-bottom: 12px; }
      .index-bottom-nav { padding-bottom: 12px; }
    }

    /* ===== v1.10 D1: Mobile bottom-sheet feedback (selectionchange) =====
       Replaces the floating mouseup tooltip on phones (< 768px). Slides
       up from the bottom, includes note input + tag chips + action
       buttons. Hidden on desktop entirely. */
    .preview-sheet-mask {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 9998;
      display: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .preview-sheet-mask.active { display: block; opacity: 1; }
    .preview-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 12px));
      display: none;
      flex-direction: column;
      gap: 10px;
      max-height: 70vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.25s ease;
    }
    .preview-sheet.active {
      display: flex;
      transform: translateY(0);
    }
    .preview-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .preview-sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      margin: -4px auto 4px;
    }
    .preview-sheet-preview {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-code);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 8px;
      max-height: 60px;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: monospace;
    }
    .preview-sheet-location {
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .preview-sheet-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .preview-sheet-tags .pst-tag {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-color);
      background: var(--btn-bg);
      color: var(--btn-text);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .preview-sheet-tags .pst-tag:hover { background: var(--bg-tertiary); }
    .preview-sheet textarea.pst-note {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-code);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
      line-height: 1.5;
      box-sizing: border-box;
    }
    .preview-sheet textarea.pst-note:focus {
      outline: none;
      border-color: var(--accent);
    }
    .preview-sheet-actions {
      display: flex;
      gap: 8px;
    }
    .preview-sheet-actions button {
      flex: 1;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .preview-sheet-actions .ps-btn-add {
      background: var(--btn-bg);
      color: var(--btn-text);
    }
    .preview-sheet-actions .ps-btn-send {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .preview-sheet-status {
      font-size: 11px;
      min-height: 14px;
      line-height: 1.3;
      text-align: center;
    }
    .preview-sheet-status.ok { color: var(--success); }
    .preview-sheet-status.error { color: var(--danger); }
    .preview-sheet-status.loading { color: var(--text-muted); }
    /* Sheet is mobile-only - hidden on desktop */
    @media (min-width: 768px) {
      .preview-sheet,
      .preview-sheet-mask { display: none !important; }
    }

    /* ===== v1.11 E1: Mermaid pinch-zoom (preview-local) ===== */
    .preview-center .mermaid {
      position: relative;
      touch-action: pan-x pan-y;
    }
    .preview-center .mermaid svg {
      transform-origin: center center;
      transition: transform 0.12s ease-out;
      will-change: transform;
      max-width: 100%;
    }
    .preview-center .mermaid-zoom-controls {
      display: none;
      position: absolute;
      right: 12px;
      bottom: 12px;
      gap: 4px;
      z-index: 5;
    }
    .preview-center .mermaid.mermaid-zoomed .mermaid-zoom-controls {
      display: inline-flex;
    }
    .preview-center .mermaid-zoom-controls button {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      min-width: 32px;
    }
    .preview-center .mermaid-zoom-controls button:hover {
      background: var(--bg-tertiary);
    }

    /* ===== v1.11 E2/E3: visualViewport keyboard offset (preview-sheet) ===== */
    /* Sheet itself is positioned via inline transform: translateY(-Npx); no
       extra rules needed here. The visualViewport handler in JS sets
       bottom: 'auto' + transform when keyboard is open, and clears
       transform when it closes. iOS Safari and Android Chrome both fire
       the 'resize' event on visualViewport when the soft keyboard
       appears (different timing/behavior, but the heuristic is the same). */

    /* ===== v1.11 F1: Immersive reading mode (preview-local) ===== */
    body.immersive .topbar,
    body.immersive .preview-bottombar,
    body.immersive .preview-left,
    body.immersive .preview-right,
    body.immersive .preview-mask,
    body.immersive .preview-sheet,
    body.immersive .preview-sheet-mask,
    body.immersive .preview-selection-tooltip,
    body.immersive .preview-toast {
      display: none !important;
    }
    body.immersive .preview-three-col {
      display: block;
    }
    body.immersive .preview-center {
      height: 100vh;
    }
    body.immersive .preview-center-body {
      padding: 28px 28px;
      max-width: 720px;
      margin: 0 auto;
    }
    /* Immersive exit hint */
    .immersive-hint {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--text-secondary);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    body.immersive .immersive-hint {
      opacity: 0.85;
    }
    /* Immersive mode is mobile-only (desktop layout >= 992px must not change) */
    @media (min-width: 992px) {
      body.immersive .topbar,
      body.immersive .preview-bottombar,
      body.immersive .preview-left,

      .preview-bottombar,
      .preview-left,
      .preview-right,
      .preview-selection-tooltip,
      .preview-toast {
        display: none !important;

      /* Unlock all overflow — fix content clipping in print */
      html, body,
      .preview-three-col,
      .preview-center,
      .preview-center-body,
      .preview-content,

        overflow: visible !important;

      }

      .markdown-body table td { border-color: #d0d7de !important; }

      /* Avoid page breaks inside code blocks and headings */
      pre, .markdown-body h1, .markdown-body h2, .markdown-body h3 {

      /* Ensure images don't overflow */

<script>
(function() {
  'use strict';

  // ============ URL Params ============
  const params = new URLSearchParams(window.location.search);
  const rootId = params.get('root') || '';
  let filePath = params.get('file') || '';
  const sessionKey = params.get('session') || '';
  let fileName = filePath.split('/').pop() || '未命名';
  const ext = fileName.includes('.') ? fileName.split('.').pop().toLowerCase() : '';
  // isMarkdown defined above
  const AUDIO_EXTS = ['mp3','ogg','wav','flac','m4a','aac','wma'];
  const VIDEO_EXTS = ['mp4','webm','mov','avi','mkv','wmv','flv','m4v'];
  const PLAIN_TEXT_EXTS = ['txt','json','csv','yaml','yml','py','js','ts','tsx','css','sh','bash','sql','toml','ini','conf','cfg','env','xml','gpx','kml','srt','log'];

  // ── Auth session expiry handler ──────────────────────────────
  const _origFetch = window.fetch;
  window.fetch = function(url, options) {
    return _origFetch.apply(this, arguments).then(function(res) {
      if (res.status === 401 || res.status === 302) {
        const redirectTo = '/clawmate/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search);
        window.location.href = redirectTo;
        return Promise.reject(new Error('auth_redirect'));
      }
      return res;
    });
  };
  const MARKDOWN_EXTS = ['md','markdown'];
  const HTML_EXTS = ['html','htm'];
  const OFFICE_EXTS = ['doc','docx','xls','xlsx','ppt','pptx','odt','ods','odp'];
  const PDF_EXT = 'pdf';
  const isAudioMode = AUDIO_EXTS.includes(ext);
  const isVideoMode = VIDEO_EXTS.includes(ext);
  const isMediaMode = isAudioMode || isVideoMode;
  const isPlainTextMode = PLAIN_TEXT_EXTS.includes(ext);
  const isMarkdownMode = MARKDOWN_EXTS.includes(ext);
  const isHtmlMode = HTML_EXTS.includes(ext);
  const isOfficeMode = OFFICE_EXTS.includes(ext);
  const isPdfMode = ext === PDF_EXT;
  const isOfficePdfMode = isOfficeMode || isPdfMode;
  // OnlyOffice mode: view or edit (for iframe src)
  // Non-PDF Office documents default to edit mode; PDF stays in view mode
  const isEditableOffice = OFFICE_EXTS.includes(ext) && ext !== 'pdf';
  let onlyofficeMode = isEditableOffice ? 'edit' : 'view';
  const project = filePath.includes('/') ? filePath.split('/')[0] : (rootId || '');

  // Update page title
  document.title = `${fileName} — ClawMate`;
  document.getElementById('docTitle').textContent = fileName;

  // Back button
  const parentDir = filePath.split('/').slice(0, -1).join('/');
  const backHref = `/clawmate/?root=${encodeURIComponent(rootId)}&dir=${encodeURIComponent(parentDir)}`;
  document.getElementById('btnBack').href = backHref;

  // ============ Theme ============
  let currentTheme = localStorage.getItem('clawmate-theme') || 'auto';

  function getResolvedTheme() {
    if (currentTheme === 'auto') {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    return currentTheme;
  }

  function switchThemeCSS(resolved) {
    const mdCss = document.getElementById('github-markdown-css');
    const hlCss = document.getElementById('highlight-theme-css');
    if (resolved === 'dark') {
      mdCss.href = './vendor/github-markdown-dark.min.css';
      hlCss.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
    } else {
      mdCss.href = './vendor/github-markdown-light.min.css';
      hlCss.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
    }
  }

  function applyTheme() {
    const resolved = getResolvedTheme();
    if (resolved === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      document.body.classList.add('dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
      document.body.classList.remove('dark');
    }
    switchThemeCSS(resolved);
    const btn = document.getElementById('themeToggle');
    if (currentTheme === 'auto') btn.textContent = '🌓';
    else if (currentTheme === 'light') btn.textContent = '☀️';
    else btn.textContent = '🌙';
  }

  function cycleTheme() {
    if (currentTheme === 'auto') currentTheme = 'light';
    else if (currentTheme === 'light') currentTheme = 'dark';
    else currentTheme = 'auto';
    localStorage.setItem('clawmate-theme', currentTheme);
    applyTheme();
  }

  document.getElementById('themeToggle').addEventListener('click', cycleTheme);
  applyTheme();

  // ============ Utilities ============
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatSize(bytes) {
    if (!bytes) return '-';
    const units = ['B', 'KB', 'MB', 'GB'];
    let i = 0;
    let num = bytes;
    while (num >= 1024 && i < units.length - 1) { num /= 1024; i++; }
    return `${num.toFixed(1)} ${units[i]}`;
  }

  async function copyText(text, msg) {
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        showToast(msg || '已复制');
        return;
      }
    } catch (_) {}
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(msg || '已复制');
  }

  function showToast(msg, duration) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.display = 'block';
    el.style.opacity = '1';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.style.opacity = '0'; setTimeout(() => { el.style.display = 'none'; }, 300); }, duration || 2000);
  }

  function buildDownloadLink(path) {
    return `/api/clawmate/download?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(path)}`;
  }

  function buildDeleteUrl(path) {
    return `/api/clawmate/delete?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(path)}`;
  }

  function removeLoading() {
    const el = document.querySelector('.preview-loading');
    if (el) el.remove();
  }

  // ============ Markdown Renderer Setup ============
  if (window.hljs) hljs.configure({ ignoreUnescapedHTML: true });

  function createMarkdownRenderer(entryRelPath) {
    let mermaidIdx = 0;
    const mermaidStore = [];
    const renderer = new marked.Renderer();

    renderer.image = function(token) {
      // marked v15+ passes a single token object {href, title, text}
      let href = token.href || '';
      const title = token.title || '';
      const text = token.text || '';
      if (!/^https?:\/\//i.test(href) && !href.startsWith('/')) {
        const dir = entryRelPath.split('/').slice(0, -1).join('/');
        const fullPath = dir ? dir + '/' + href : href;
        href = `/api/clawmate/preview?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(fullPath)}`;
      }
      return `<img src="${href}" alt="${escHtml(text)}"${title ? ` title="${escHtml(title)}"` : ''}>`;
    };

    renderer.code = function(codeInfo, lang) {
      let code = codeInfo;
      let language = lang || '';
      if (codeInfo && typeof codeInfo === 'object') {
        code = codeInfo.text || '';
        language = codeInfo.lang || language;
      }
      const raw = typeof code === 'string' ? code : '';
      const className = language ? `language-${language}` : '';

      if (language === 'mermaid') {
        const id = mermaidIdx++;
        mermaidStore[id] = raw;
        return `<div class="mermaid" data-mermaid-id="${id}"></div>`;
      }

      // Let hljs.highlightAll() handle syntax highlighting after DOM insertion;
      // mermaid blocks are handled separately via the div wrapper above.
      return `<pre><code class="${className}">${escHtml(raw)}</code></pre>`;
    };

    return { renderer, mermaidStore };
  }

  async function renderMermaid(div, mermaidStore) {
    var blocks = div.querySelectorAll('.mermaid');
    if (!blocks.length) return;
    console.log('[ClawMate] renderMermaid: found ' + blocks.length + ' mermaid block(s), store size=' + mermaidStore.length);

    var scopeClass = 'mermaid-scope-' + Date.now();
    div.classList.add(scopeClass);

    if (!window.mermaid) {
      console.warn('[ClawMate] Mermaid \u5e93\u672a\u52a0\u8f7d');
      for (var i = 0; i < blocks.length; i++) {
        blocks[i].classList.add('mermaid-error');
        blocks[i].textContent = '\u26a0\ufe0f Mermaid \u5e93\u672a\u52a0\u8f7d\uff0c\u8bf7\u5237\u65b0\u9875\u9762\u91cd\u8bd5';
      }
      return;
    }

    try {
      var resolvedTheme = getResolvedTheme();
      var mermaidTheme = resolvedTheme === 'dark' ? 'dark' : 'default';

      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'strict',
        fontFamily: 'ui-monospace, SF Mono, Cascadia Code, Consolas, monospace',
        maxWidth: 800,
        theme: mermaidTheme
      });

      // Restore stored code into each .mermaid block before calling mermaid.run()
      for (var i = 0; i < blocks.length; i++) {
        var b = blocks[i];
        var id = b.getAttribute('data-mermaid-id');
        if (id == null || !mermaidStore[id]) {
          b.classList.add('mermaid-error');
          b.textContent = '\u26a0\ufe0f \u56fe\u8868\u6570\u636e\u4e22\u5931\uff08id=' + (id || 'null') + '\uff09';
          continue;
        }
        b.textContent = mermaidStore[id];
      }

      console.log('[ClawMate] Calling mermaid.run() with scope=' + scopeClass + ', store has ' + mermaidStore.length + ' entries');
      await window.mermaid.run({ querySelector: '.' + scopeClass + ' .mermaid' });
      console.log('[ClawMate] mermaid.run() completed successfully');

      // Fix quadrantChart NaN% colors (Mermaid v11 bug)
      for (var i = 0; i < blocks.length; i++) {
        blocks[i].querySelectorAll('[fill*="NaN%"], [stroke*="NaN%"]').forEach(function(el) {
          var fill = el.getAttribute('fill') || '';
          var stroke = el.getAttribute('stroke') || '';
          if (fill.indexOf('NaN%') !== -1) el.setAttribute('fill', fill.replace(/hsl\([^)]*NaN%[^)]*\)/g, resolvedTheme === 'dark' ? '#58a6ff' : '#4f46e5'));
          if (stroke.indexOf('NaN%') !== -1) el.setAttribute('stroke', stroke.replace(/hsl\([^)]*NaN%[^)]*\)/g, resolvedTheme === 'dark' ? '#58a6ff' : '#4f46e5'));
        });
      }
    } catch (err) {
      var errMsg = err && (err.message || err.str || String(err));
      console.error('[ClawMate] Mermaid \u6e32\u67d3\u5931\u8d25:', errMsg, err);
      for (var i = 0; i < blocks.length; i++) {
        blocks[i].classList.add('mermaid-error');
        blocks[i].textContent = '\u26a0\ufe0f Mermaid \u6e32\u67d3\u5931\u8d25 \u2014 ' + errMsg + '\n\n\u2193 \u539f\u6587\u5185\u5bb9\u89c1\u4e0b\u65b9\u6e90\u7801\u6a21\u5f0f';
      }
    } finally {
      div.classList.remove(scopeClass);
    }
  }

  function buildTOC(div) {
    const headings = div.querySelectorAll('h1, h2, h3, h4');
    if (headings.length < 2) {
      // No meaningful TOC — collapse left sidebar
      leftSidebar.classList.add('hidden');
      updateGridColumns();
      return;
    }
    // Show sidebar and build TOC
    leftSidebar.classList.remove('hidden');
    updateGridColumns();
    headings.forEach((h, i) => { if (!h.id) h.id = `heading-${i}`; });

    const list = document.createElement('ul');
    list.className = 'preview-toc-list';

    headings.forEach(h => {
      const level = parseInt(h.tagName[1]);
      const li = document.createElement('li');
      li.className = `preview-toc-item toc-h${level}`;
      const a = document.createElement('a');
      a.href = `#${h.id}`;
      a.textContent = h.textContent;
      a.addEventListener('click', e => {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      li.appendChild(a);
      list.appendChild(li);
    });

    const tocBody = document.getElementById('tocBody');
    tocBody.innerHTML = '';
    tocBody.appendChild(list);

    // IntersectionObserver for active TOC highlight
    if (typeof IntersectionObserver !== 'undefined') {
      const links = list.querySelectorAll('a');
      let activeLink = null;
      const observer = new IntersectionObserver(entries => {
        const visible = entries.filter(e => e.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        if (visible.length > 0) {
          const link = list.querySelector(`a[href="#${visible[0].target.id}"]`);
          if (link && link !== activeLink) {
            if (activeLink) activeLink.classList.remove('toc-active');
            link.classList.add('toc-active');
            activeLink = link;
          }
        }
      }, { root: null, rootMargin: '-10% 0px -80% 0px', threshold: 0 });
      headings.forEach(h => observer.observe(h));
    }
  }

  function addCopyButtons(div) {
    div.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.code-copy-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.textContent = '复制';
      btn.addEventListener('click', async () => {
        const code = pre.querySelector('code');
        const text = code ? code.textContent : pre.textContent;
        await copyText(text, '代码已复制');
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });
  }

  function openLinksInNewTab(div) {
    div.querySelectorAll('a').forEach(a => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });
  }

  // ============ Code Outline ============
  let codeOutlineItems = [];

  function parseCodeOutline(content, ext) {
    var lines = content.split('\n');
    var items = [];
    var patterns = {
      py: [
        [/^\s*def\s+(\w+)\s*\(/, function(m) { return 'def ' + m[1] + '(...)'; }],
        [/^\s*class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*async\s+def\s+(\w+)\s*\(/, function(m) { return 'async def ' + m[1] + '(...)'; }],
      ],
      js: [
        [/^\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
        [/^\s*(?:export\s+)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*(?:static\s+)?(?:async\s+)?(\w+)\s*\([^)]*\)\s*\{/, function(m) { return m[1] + '()'; }, true],
        [/^\s*(?:export\s+)?(?:const|let|var)\s+(\w+)\s*=\s*(?:async\s*)?\(/, function(m) { return 'const ' + m[1] + ' = (...) =>'; }],
        [/^\s*(?:export\s+)?(?:const|let|var)\s+(\w+)\s*=\s*(?:async\s+)?function/, function(m) { return 'const ' + m[1] + ' = function'; }],
      ],
      ts: [
        [/^\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
        [/^\s*(?:export\s+)?(?:abstract\s+)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*(?:export\s+)?interface\s+(\w+)/, function(m) { return 'interface ' + m[1]; }],
        [/^\s*(?:async\s+)?(\w+)\s*\([^)]*\)\s*(?::\s*\w+)?\s*\{/, function(m) { return m[1] + '()'; }, true],
        [/^\s*(?:export\s+)?(?:const|let|var)\s+(\w+)\s*:\s*(?:.*=>|[\w<>]+)\s*=/, function(m) { return 'const ' + m[1]; }],
      ],
      tsx: [
        [/^\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
        [/^\s*(?:export\s+)?(?:abstract\s+)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*(?:export\s+)?interface\s+(\w+)/, function(m) { return 'interface ' + m[1]; }],
        [/^\s*(?:async\s+)?(\w+)\s*\([^)]*\)\s*(?::\s*\w+)?\s*\{/, function(m) { return m[1] + '()'; }, true],
      ],
      go: [
        [/^\s*func\s+\((\w+)\s+(\*?\w+)\)\s+(\w+)\s*\(/, function(m) { return 'func (' + m[1] + ' ' + m[2] + ') ' + m[3] + '(...)'; }],
        [/^\s*func\s+(\w+)\s*\(/, function(m) { return 'func ' + m[1] + '(...)'; }],
        [/^\s*type\s+(\w+)\s+(?:struct|interface)/, function(m) { return 'type ' + m[1]; }],
      ],
      java: [
        [/^\s*(?:public|private|protected)?\s*(?:static|final|abstract)?\s*(?:class|interface)\s+(\w+)/, function(m) { return m[0].trim().split(/\s+/)[0] + ' ' + m[1]; }],
        [/^\s*(?:public|private|protected)?\s*(?:static|final|abstract|\s)+[\w<>\[\],\s]+\s+(\w+)\s*\(/, function(m) { return m[1] + '()'; }],
      ],
      rs: [
        [/^\s*(?:pub\s+)?fn\s+(\w+)/, function(m) { return 'fn ' + m[1] + '()'; }],
        [/^\s*(?:pub\s+)?struct\s+(\w+)/, function(m) { return 'struct ' + m[1]; }],
        [/^\s*(?:pub\s+)?trait\s+(\w+)/, function(m) { return 'trait ' + m[1]; }],
        [/^\s*(?:pub\s+)?impl\s+(\w+)/, function(m) { return 'impl ' + m[1]; }],
        [/^\s*(?:pub\s+)?enum\s+(\w+)/, function(m) { return 'enum ' + m[1]; }],
      ],
      c: [
        [/^\s*(?:static\s+)?(?:inline\s+)?(?:\w+[\s*]+)+(\w+)\s*\([^)]*\)\s*\{/, function(m) { return m[1] + '()'; }],
      ],
      cpp: [
        [/^\s*(?:static\s+)?(?:inline\s+)?(?:virtual\s+)?(?:\w+(?:::)?)+[\s*&]+(\w+)\s*\([^)]*\)\s*(?:const\s*)?\{/, function(m) { return m[1] + '()'; }],
        [/^\s*(?:template\s*<[^>]*>\s*)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
      ],
      h: [
        [/^\s*(?:static\s+)?(?:inline\s+)?(?:\w+[\s*]+)+(\w+)\s*\([^)]*\)\s*(?:const\s*)?;/, function(m) { return m[1] + '()'; }],
        [/^\s*(?:template\s*<[^>]*>\s*)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
      ],
      sh: [
        [/^\s*(\w+)\s*\(\)\s*\{/, function(m) { return m[1] + '()'; }],
        [/^\s*function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
      ],
      bash: [
        [/^\s*(\w+)\s*\(\)\s*\{/, function(m) { return m[1] + '()'; }],
        [/^\s*function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
      ],
    };
    var langPatterns = patterns[ext] || [];
    var JS_KEYS = [
      'if','else','for','while','switch','case','break','continue','return',
      'throw','try','catch','finally','do','with','new','delete','typeof',
      'instanceof','void','in','of','await','debugger','export','import',
      'yield','super','this','async','true','false','null','undefined',
      'let','var','const','function','class','extends','implements','static',
      'get','set','enum','interface','type','namespace','module','require',
      'from','as','default','public','private','protected','readonly'
    ];
    var JS_KEYWORDS = {};
    for (var k = 0; k < JS_KEYS.length; k++) JS_KEYWORDS[JS_KEYS[k]] = true;
    if (!langPatterns.length) return items;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      for (var j = 0; j < langPatterns.length; j++) {
        var entry = langPatterns[j];
        var regex = entry[0];
        var formatter = entry[1];
        var skipKws = entry[2];
        var m = line.match(regex);
        if (m) {
          if (skipKws && JS_KEYWORDS[m[1]]) break;
          items.push({ text: formatter(m).trim(), line: i + 1 });
          break;
        }
      }
    }
    return items;
  }

  function scrollToCodeLine(lineNum) {
    var pre = contentBody.querySelector('pre');
    if (!pre) return;
    var lineHeight = parseFloat(getComputedStyle(pre).lineHeight) || 22;
    var scrollTarget = Math.max(0, (lineNum - 4) * lineHeight);
    pre.parentElement.scrollTop = scrollTarget;
  }

  function renderCodeOutline(items) {
    var tocBody = document.getElementById('tocBody');
    // Only update content; do NOT change sidebar visibility
    // (sidebar visibility is controlled by the outline toggle button)
    if (items.length < 2) {
      tocBody.innerHTML = '<div class="preview-toc-empty">无可索引的函数或类定义</div>';
      return false;
    }
    var list = document.createElement('ul');
    list.className = 'preview-toc-list';
    items.forEach(function(item) {
      var li = document.createElement('li');
      li.className = 'preview-toc-item toc-code';
      var a = document.createElement('a');
      a.href = '#';
      a.textContent = item.text;
      a.addEventListener('click', function(e) {
        e.preventDefault();
        scrollToCodeLine(item.line);
      });
      li.appendChild(a);
      list.appendChild(li);
    });
    tocBody.innerHTML = '';
    tocBody.appendChild(list);
    return true;
  }

  // ============ Source Edit Mode (Markdown / HTML raw) ============
  let isPlainTextEditMode = false;
  let sourceDirty = false;

  function _updateSourcePre(pre, content) {
    if (!pre) return;
    var code = pre.querySelector('code');
    if (code) {
      code.innerHTML = content;
    } else {
      pre.textContent = content;
    }
  }

  function enterSourceEditMode() {
    const srcPre = document.getElementById('sourceRawPre');
    if (!srcPre) return;
    isPlainTextEditMode = true;
    sourceDirty = false;
    srcPre.style.display = 'none';
    // Also hide the HTML iframe when entering edit mode (HTML mode only)
    if (isHtmlMode) {
      const htmlIframe = document.getElementById('htmlIframe');
      if (htmlIframe) htmlIframe.style.display = 'none';
    }
    const ta = document.createElement('textarea');
    ta.id = 'plainTextEditor';
    ta.className = 'edit-textarea';
    ta.value = rawContent;
    ta.spellcheck = false;
    // Insert after the banner (or as first child if no banner)
    const banner = document.getElementById('sourceEditBanner');
    if (banner) {
      banner.style.display = '';
      srcPre.parentNode.insertBefore(ta, banner.nextSibling);
    } else {
      srcPre.parentNode.insertBefore(ta, srcPre);
    }
    // Fix: position cursor and scroll at file beginning
    ta.selectionStart = 0;
    ta.selectionEnd = 0;
    ta.scrollTop = 0;
    updateMarkdownDynamicButtons();
    ta.focus();
    ta.addEventListener('input', () => {
      sourceDirty = ta.value !== rawContent;
      updateMarkdownDynamicButtons();
    });
  }

  function exitSourceEditMode() {
    const ta = document.getElementById('plainTextEditor');
    const srcPre = document.getElementById('sourceRawPre');
    const banner = document.getElementById('sourceEditBanner');
    if (ta) ta.remove();
    if (banner) banner.style.display = 'none';
    if (srcPre) {
      srcPre.style.display = isRawMode ? '' : 'none';
    }
    // Restore iframe visibility when exiting HTML edit mode
    if (isHtmlMode) {
      const htmlIframe = document.getElementById('htmlIframe');
      if (htmlIframe) htmlIframe.style.display = isRawMode ? 'none' : '';
    }
    isPlainTextEditMode = false;
    sourceDirty = false;
    updateMarkdownDynamicButtons();
  }

  async function saveSourceEdit() {
    const ta = document.getElementById('plainTextEditor');
    if (!ta) return;
    const newContent = ta.value;
    try {
      const res = await fetch('/api/clawmate/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ root: rootId, path: filePath, content: newContent }),
      });
      const data = await res.json();
      if (data.ok) {
        showToast('已保存', 2000);
        rawContent = newContent;
        const srcPre = document.getElementById('sourceRawPre');
        if (srcPre) _updateSourcePre(srcPre, newContent);
        exitSourceEditMode();
      } else {
        const isSyntaxErr = data.error && data.error.includes('syntax_error');
        showToast('❌ ' + (data.detail || '未知错误'), isSyntaxErr ? 8000 : 3000);
      }
    } catch (e) {
      showToast('保存失败: ' + e.message, 3000);
    }
  }

  // Plain text edit mode (separate, used for non-markdown plain text)
  function enterPlainTextEditMode() {
    isPlainTextEditMode = true;
    sourceDirty = false;
    loadContent();
    // loadContent already calls updatePlainTextDynamicButtons; no need to call again here
    // Fix: position cursor and scroll at file beginning
    setTimeout(() => {
      const ta = document.getElementById('plainTextEditor');
      if (ta) {
        ta.selectionStart = 0;
        ta.selectionEnd = 0;
        ta.scrollTop = 0;
        ta.focus();
      }
    }, 50);
  }

  async function savePlainTextContent() {
    const ta = document.getElementById('plainTextEditor');
    if (!ta) return;
    const newContent = ta.value;
    try {
      const res = await fetch('/api/clawmate/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ root: rootId, path: filePath, content: newContent }),
      });
      const data = await res.json();
      if (data.ok) {
        showToast('已保存', 2000);
        rawContent = newContent;
        isPlainTextEditMode = false;
        sourceDirty = false;
        loadContent();
        // loadContent already calls updatePlainTextDynamicButtons for non-edit mode
      } else {
        const isSyntaxErr = data.error && data.error.includes('syntax_error');
        showToast('❌ ' + (data.detail || '未知错误'), isSyntaxErr ? 8000 : 3000);
      }
    } catch (e) {
      showToast('保存失败: ' + e.message, 3000);
    }
  }

  function updatePlainTextDynamicButtons() {
    var dyn = document.getElementById('bottombarDynamic');
    dyn.innerHTML = '';
    var sep = document.getElementById('bottombarDynamicSep');
    if (sep) sep.style.display = '';

    // Outline toggle — always present for code files with symbols (same as markdown)
    if (codeOutlineItems.length >= 2) {
      var outlineBtn = document.createElement('button');
      outlineBtn.className = 'preview-bottom-btn' + (leftSidebar.classList.contains('hidden') ? '' : ' active');
      outlineBtn.id = 'btnCodeOutline';
      outlineBtn.textContent = '📑 大纲';
      outlineBtn.addEventListener('click', function() {
        // v1.11 G4: route through state machine
        if (typeof UIState !== 'undefined' && UIState) {
          if (UIState.get() === 'left-open') UIState.set('idle');
          else UIState.set('left-open');
        } else {
          leftSidebar.classList.toggle('hidden');
          updateGridColumns();
        }
        updatePlainTextDynamicButtons();
      });
      dyn.appendChild(outlineBtn);
      // Use existing preview-bottom-divider as separator (same as markdown)
      var divider = document.createElement('div');
      divider.className = 'preview-bottom-divider';
      dyn.appendChild(divider);
    }

    if (isPlainTextEditMode) {
      if (sourceDirty) {
        var saveBtn = document.createElement('button');
        saveBtn.className = 'preview-bottom-btn active';
        saveBtn.id = 'btnPlainTextSave';
        saveBtn.textContent = '💾 保存';
        saveBtn.addEventListener('click', savePlainTextContent);
        dyn.appendChild(saveBtn);
      }
      var cancelBtn = document.createElement('button');
      cancelBtn.className = 'preview-bottom-btn active';
      cancelBtn.id = 'btnPlainTextCancel';
      cancelBtn.textContent = '❌ 取消';
      cancelBtn.addEventListener('click', function() {
        isPlainTextEditMode = false;
        sourceDirty = false;
        loadContent();
      });
      dyn.appendChild(cancelBtn);
    } else {
      var editBtn = document.createElement('button');
      editBtn.className = 'preview-bottom-btn';
      editBtn.id = 'btnPlainTextEdit';
      editBtn.textContent = '✏️ 编辑';
      editBtn.addEventListener('click', enterPlainTextEditMode);
      dyn.appendChild(editBtn);
    }
  }

  // ============ Markdown Dynamic Toolbar ============
  function updateMarkdownDynamicButtons() {
    const dyn = document.getElementById('bottombarDynamic');
    dyn.innerHTML = '';
    const sep = document.getElementById('bottombarDynamicSep');
    if (sep) sep.style.display = '';

    // Outline toggle — always present for markdown (not affected by raw/render mode)
    if (isMarkdownMode) {
      const outlineBtn = document.createElement('button');
      outlineBtn.className = 'preview-bottom-btn' + (leftSidebar.classList.contains('hidden') ? '' : ' active');
      outlineBtn.id = 'btnOutline';
      outlineBtn.textContent = '📑 大纲';
      outlineBtn.addEventListener('click', () => {
        // v1.11 G4: route through state machine
        if (typeof UIState !== 'undefined' && UIState) {
          if (UIState.get() === 'left-open') UIState.set('idle');
          else UIState.set('left-open');
        } else {
          leftSidebar.classList.toggle('hidden');
          updateGridColumns();
        }
        updateMarkdownDynamicButtons(); // Refresh active state
      });
      dyn.appendChild(outlineBtn);
    }

    // Source/Render toggle (Markdown/HTML)
    const srcBtn = document.createElement('button');
    srcBtn.className = 'preview-bottom-btn';
    srcBtn.id = 'btnSrcToggle';
    srcBtn.textContent = isRawMode ? '📝 渲染' : '📝 源码';
    srcBtn.addEventListener('click', toggleRawMode);
    dyn.appendChild(srcBtn);

    // Edit/Save (only in raw/source mode for Markdown/HTML)
    if ((isRawMode && isMarkdownMode) || (isRawMode && isHtmlMode)) {
      if (isPlainTextEditMode) {
        // Save button: only visible when content is dirty
        if (sourceDirty) {
          const saveBtn = document.createElement('button');
          saveBtn.className = 'preview-bottom-btn active';
          saveBtn.id = 'btnSrcSave';
          saveBtn.textContent = '💾 保存';
          saveBtn.addEventListener('click', saveSourceEdit);
          dyn.appendChild(saveBtn);
        }
        // Edit toggle button (active while editing, click to cancel)
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'preview-bottom-btn active';
        cancelBtn.id = 'btnSrcEdit';
        cancelBtn.textContent = '❌ 取消';
        cancelBtn.addEventListener('click', exitSourceEditMode);
        dyn.appendChild(cancelBtn);
      } else {
        // Edit button (not editing): enter edit mode
        const editBtn = document.createElement('button');
        editBtn.className = 'preview-bottom-btn';
        editBtn.id = 'btnSrcEdit';
        editBtn.textContent = '✏️ 编辑';
        editBtn.addEventListener('click', enterSourceEditMode);
        dyn.appendChild(editBtn);
      }
    }
  }

  // ============ Raw Mode Toggle ============
  let isRawMode = false;
  // isHtmlMode defined above

  // Mode toggle via bottom toolbar (btnSrcToggle) — no longer uses topbar btnRawToggle
  function toggleRawMode() {
    const prevRawMode = isRawMode;
    isRawMode = !isRawMode;

    // If currently in source edit mode, exit it first (before any DOM changes)
    if (isPlainTextEditMode) {
      exitSourceEditMode();
    }
    sourceDirty = false;

    // Plain text / code edit mode: always rebuild (transitions pre ↔ textarea)
    if (isPlainTextMode) {
      loadContent();
      updateMarkdownDynamicButtons();
      return;
    }

    // Markdown / HTML: avoid full rebuild — only toggle visibility of existing elements
    if (isMarkdownMode || isHtmlMode) {
      const mdDiv = document.getElementById('markdownRenderedDiv');
      const srcPre = document.getElementById('sourceRawPre');
      const htmlIframe = document.getElementById('htmlIframe');

      if (isRawMode) {
        // Switch to source view
        if (mdDiv) mdDiv.style.display = 'none';
        if (htmlIframe) htmlIframe.style.display = 'none';
        if (srcPre) {
          srcPre.style.display = '';
          // Refresh source content in case it was edited
          if (srcPre.textContent !== rawContent) _updateSourcePre(srcPre, rawContent);
        }
      } else {
        // Switch to rendered view
        if (mdDiv) mdDiv.style.display = '';
        if (htmlIframe) htmlIframe.style.display = '';
        if (srcPre) srcPre.style.display = 'none';
      }
      updateMarkdownDynamicButtons();
      return;
    }

    // Fallback: full reload for any other type
    loadContent();
    updateMarkdownDynamicButtons();
  }

  function applyMarkdownModeView() {
    const mdDiv = document.getElementById('markdownRenderedDiv');
    const srcPre = document.getElementById('sourceRawPre');
    const htmlIframe = document.getElementById('htmlIframe');
    if (!mdDiv && !srcPre && !htmlIframe) return;
    if (isRawMode) {
      if (mdDiv) mdDiv.style.display = 'none';
      if (htmlIframe) htmlIframe.style.display = 'none';
      if (srcPre) {
        srcPre.style.display = '';
        _updateSourcePre(srcPre, rawContent);
      }
    } else {
      if (mdDiv) mdDiv.style.display = '';
      if (htmlIframe) htmlIframe.style.display = '';
      if (srcPre) srcPre.style.display = 'none';
    }
  }

  // Toggle right (feedback) panel
  document.getElementById('btnToggleRight').addEventListener('click', () => {
    // v1.11 G4: route through state machine
    if (typeof UIState !== 'undefined' && UIState) {
      if (UIState.get() === 'right-open') UIState.set('idle');
      else UIState.set('right-open');
    } else {
      rightSidebar.classList.toggle('hidden');
      updateGridColumns();
    }
    document.getElementById('btnToggleRight').classList.toggle('active', !rightSidebar.classList.contains('hidden'));
  });

  // ============ Raw Markdown Content (for accurate line number calculation) ============
  let rawContent = '';

  // ============ Load & Render Content ============
  async function loadContent() {
    // Clean up Office/PDF mode class from body (will be re-added if needed)
    const contentBody = document.getElementById('contentBody');
    codeOutlineItems = [];

    try {
      // For binary file types, the API returns raw bytes — do NOT call res.json()
      if (isImageMode) {
        contentBody.innerHTML = '';
        const img = document.createElement('img');
        img.src = `/api/clawmate/preview?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(filePath)}`;
        img.style.cssText = 'max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px;display:block;margin:0 auto;';
        contentBody.appendChild(img);
        removeLoading();
        setupMediaToolbar();
        renderImageFeedbackPanel();
        loadCompletedFeedback();
        loadImageNav();
        return;
      }

      if (isVideoMode) {
        setupMediaMode('video');
        removeLoading();
        loadCompletedFeedback();
        return;
      }

      const res = await fetch(`/api/clawmate/preview?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(filePath)}`);
      if (!res.ok) {
        contentBody.innerHTML = `<div class="preview-error">无法加载文件 (${res.status})</div>`;
        return;
      }

      const ct = res.headers.get('content-type') || '';
      if (ct.startsWith('image/') || ct.startsWith('video/') || ct.startsWith('audio/') || ct.startsWith('application/octet-stream')) {
        // Binary response — render directly without JSON parsing
        if (ct.startsWith('video/') || isVideoMode) {
          setupMediaMode('video');
          removeLoading();
          loadCompletedFeedback();
          return;
        }
        if (ct.startsWith('audio/') || isAudioMode) {
          setupMediaMode('audio');
          removeLoading();
          loadCompletedFeedback();
          return;
        }
        // Fallback for unknown binary
        contentBody.innerHTML = `<div class="preview-error">无法预览此文件类型</div>`;
        removeLoading();
        return;
      }

      const data = await res.json();
      const content = data.content || '';

      // Truncation notice
      if (data.truncated) {
        const notice = document.createElement('div');
        notice.className = 'preview-truncated-notice';
        notice.style.cssText = 'background:var(--warning-bg);color:var(--warning-text);padding:8px 16px;font-size:12px;margin-bottom:12px;border-radius:6px;';
        notice.textContent = '⚠️ 文件过大（>5MB），内容已截断';
        contentBody.appendChild(notice);
      }

      // Store raw content for selection feedback and line number calculation
      rawContent = content;
      contentBody.dataset.rawContent = content;
      contentBody.dataset.feedbackRoot = rootId;
      contentBody.dataset.feedbackPath = filePath;
      contentBody.dataset.feedbackProject = project;

      // ======== Office / PDF ========
      if (isOfficePdfMode) {
        // Office/PDF mode: all buttons still visible (拷贝/导出/下载/重命名)

        // Build wrapper div for iframe
        const wrap = document.createElement('div');
        wrap.className = 'office-iframe-wrap';
        wrap.id = 'officeIframeWrap';

        const iframe = document.createElement('iframe');
        iframe.id = 'officeIframe';
        iframe.src = `./onlyoffice.html?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(filePath)}&mode=${encodeURIComponent(onlyofficeMode)}`;
        iframe.style.cssText = 'width:100%;height:100%;border:none;overflow:hidden;';
        wrap.appendChild(iframe);

        contentBody.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;padding:0;';
        contentBody.appendChild(wrap);
        removeLoading();

        // Set up dynamic toolbar and feedback
        setupOfficePdfToolbar();
        loadOfficePdfCompletedFeedback();
        return;
      }

      // ======== Markdown: render both views, then apply mode ========
      if (isMarkdownMode && window.marked && window.DOMPurify) {
        // Clear any previous content before building
        contentBody.innerHTML = '';
        // Create edit banner (hidden until edit mode is entered)
        const banner = document.createElement('div');
        banner.id = 'sourceEditBanner';
        banner.className = 'edit-mode-banner';
        banner.innerHTML = '<span class="edit-badge">编辑中</span> 你正在编辑源文件';
        banner.style.display = 'none';
        contentBody.appendChild(banner);

        // Create source view (raw pre, hidden by default unless isRawMode)
        const srcPre = document.createElement('pre');
        srcPre.id = 'sourceRawPre';
        srcPre.textContent = content;
        if (window.hljs) {
          try {
            const highlighted = hljs.highlight(content, { language: 'markdown', ignoreIllegals: true }).value;
            const code = document.createElement('code');
            code.className = 'language-markdown';
            code.innerHTML = highlighted;
            srcPre.appendChild(code);
            srcPre.className = 'code-highlighted';
          } catch (_) {
            srcPre.className = 'raw-text';
          }
        } else {
          srcPre.className = 'raw-text';
        }
        srcPre.style.display = isRawMode ? '' : 'none';
        contentBody.appendChild(srcPre);

        // Create rendered markdown div
        const mdDiv = document.createElement('div');
        mdDiv.id = 'markdownRenderedDiv';
        mdDiv.className = 'markdown-body';
        mdDiv.style.display = isRawMode ? 'none' : '';

        let html;
        let mermaidStore = [];
        try {
          const result = createMarkdownRenderer(filePath);
          const renderer = result.renderer;
          mermaidStore = result.mermaidStore;
          marked.use({ renderer: renderer, breaks: false, gfm: true });
          html = marked.parse(content);
          if (window.DOMPurify) {
            html = DOMPurify.sanitize(html, { ADD_ATTR: ['class', 'target', 'data-highlighted'] });
          }
        } catch (e) {
          const errMsg = e && e.message ? (e.message + '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : String(e || '未知错误');
          // Use mdDiv to show error so source <-> render toggle works both ways
          mdDiv.innerHTML = '<div style="padding:40px;color:var(--danger);font-family:monospace;font-size:14px;line-height:1.6;"><strong>\u26a0\ufe0f Markdown \u6e32\u67d3\u5931\u8d25</strong><br><br>' + errMsg + '<br><br><span style="color:var(--text-secondary)">\u4e0b\u65b9\u5df2\u5207\u6362\u81f3\u6e90\u7801\u6a21\u5f0f\uff0c\u53ef\u70b9\u51fb\u300c\ud83d\udcdd \u6e32\u67d3\u300d\u5207\u56de\u9519\u8bef\u63d0\u793a</span></div>';
          mdDiv.style.display = 'none';
          contentBody.appendChild(mdDiv);
          // Force source view so user can still read the file
          srcPre.style.display = '';
          isRawMode = true;
          leftSidebar.classList.add('hidden');
          updateGridColumns();
          removeLoading();
          updateMarkdownDynamicButtons();
          return;
        }
        // Parse succeeded — render markdown
        mdDiv.innerHTML = html;
        contentBody.appendChild(mdDiv);

        buildTOC(mdDiv);
        openLinksInNewTab(mdDiv);
        addCopyButtons(mdDiv);

        if (window.hljs) {
          try { hljs.highlightAll(); } catch (_) {}
        }

        if (window.renderMathInElement) {
          try {
            renderMathInElement(mdDiv, {
              delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\(', right: '\)', display: false},
                {left: '\[', right: '\]', display: true}
              ],
              throwOnError: false,
              errorColor: '#dc2626',
              strict: false,
              ignoredClasses: ['mermaid', 'mermaid-error', 'pre', 'code']
            });
          } catch (_) {}
        }

        console.log('[ClawMate] About to call renderMermaid, mermaidStore has ' + mermaidStore.length + ' entries');
        try { await renderMermaid(mdDiv, mermaidStore); } catch (e) { console.error('[ClawMate] renderMermaid threw:', e); }
        removeLoading();
        updateMarkdownDynamicButtons();
        loadCompletedFeedback();
        return;
      }

      // ======== HTML: render via iframe + source view with hljs ========
      if (isHtmlMode) {
        contentBody.innerHTML = '';

        // Edit banner (hidden until edit mode is entered)
        const banner = document.createElement('div');
        banner.id = 'sourceEditBanner';
        banner.className = 'edit-mode-banner';
        banner.innerHTML = '<span class="edit-badge">编辑中</span> 你正在编辑源文件';
        banner.style.display = 'none';
        contentBody.appendChild(banner);

        // Make contentBody a flex column so htmlWrap fills remaining space
        contentBody.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;padding:0;';

        // Wrapper for iframe + source pre (allows coordinated show/hide)
        const htmlWrap = document.createElement('div');
        htmlWrap.id = 'htmlContentWrap';
        htmlWrap.style.cssText = 'display:flex;flex-direction:column;flex:1;overflow:hidden;';
        contentBody.appendChild(htmlWrap);

        // iframe for rendered HTML view
        const htmlIframe = document.createElement('iframe');
        htmlIframe.id = 'htmlIframe';
        htmlIframe.style.cssText = 'flex:1;border:none;overflow:auto;background:#fff;';
        // Use raw HTML content directly (files come from white-listed dirs)
        // DOMPurify would strip scripts/styles needed by complex HTML pages
        htmlIframe.srcdoc = content;
        htmlIframe.style.display = isRawMode ? 'none' : '';
        htmlWrap.appendChild(htmlIframe);

        // Source view (highlighted pre, hidden by default unless isRawMode)
        const srcPre = document.createElement('pre');
        srcPre.id = 'sourceRawPre';
        srcPre.className = 'code-highlighted';
        srcPre.style.display = isRawMode ? '' : 'none';
        srcPre.style.flex = '1';
        srcPre.style.overflow = 'auto';
        srcPre.style.margin = '0';
        srcPre.style.borderRadius = '0';
        if (window.hljs) {
          try {
            const highlighted = hljs.highlight(content, { language: 'html', ignoreIllegals: true }).value;
            const code = document.createElement('code');
            code.className = 'language-html';
            code.innerHTML = highlighted;
            srcPre.appendChild(code);
          } catch (_) {
            srcPre.textContent = content;
          }
        } else {
          srcPre.textContent = content;
        }
        htmlWrap.appendChild(srcPre);

        removeLoading();
        updateMarkdownDynamicButtons();
        loadCompletedFeedback();
        return;
      }

      // Plain text / code with highlight + optional edit mode
        // Parse code outline once for both edit and display modes
        codeOutlineItems = parseCodeOutline(rawContent, ext);
        contentBody.innerHTML = '';

        if (isPlainTextEditMode) {
          // Edit mode: show textarea
          const banner = document.createElement('div');
          banner.className = 'edit-mode-banner';
          banner.innerHTML = '<span class="edit-badge">编辑中</span> 你正在编辑源文件';
          contentBody.appendChild(banner);

          const ta = document.createElement('textarea');
          ta.className = 'edit-textarea';
          ta.id = 'plainTextEditor';
          ta.value = rawContent;
          ta.spellcheck = false;
          ta.style.height = (contentBody.clientHeight - 10) + 'px';
          ta.addEventListener('input', () => {
            sourceDirty = ta.value !== rawContent;
            updatePlainTextDynamicButtons();
          });
          contentBody.appendChild(ta);
          removeLoading();
          // Render outline sidebar for code (edit mode: populate content, don't change visibility)
          if (codeOutlineItems.length >= 2) {
            renderCodeOutline(codeOutlineItems);
          }
          updatePlainTextDynamicButtons();
        } else {
          // Display mode: syntax-highlighted pre
          const pre = document.createElement('pre');
          pre.className = 'code-highlighted';
          const langMap = { json: 'json', xml: 'xml', yaml: 'yaml', yml: 'yaml', py: 'python', js: 'javascript', ts: 'typescript', tsx: 'typescript', sql: 'sql', sh: 'bash', bash: 'bash', css: 'css', log: 'plaintext', txt: 'plaintext', csv: 'plaintext', kml: 'xml', gpx: 'xml', srt: 'plaintext', toml: 'ini', ini: 'ini', conf: 'plaintext', cfg: 'ini', env: 'bash', yaml: 'yaml' };
          const lang = langMap[ext] || 'plaintext';
          if (lang !== 'plaintext' && window.hljs) {
            try {
              const highlighted = hljs.highlight(rawContent, { language: lang, ignoreIllegals: true }).value;
              const code = document.createElement('code');
              code.className = `language-${lang}`;
              code.innerHTML = highlighted;
              pre.appendChild(code);
            } catch (_) { pre.textContent = rawContent; }
          } else {
            pre.textContent = rawContent;
          }
          contentBody.appendChild(pre);
          removeLoading();
          // Render outline sidebar for code (display mode: auto-open on first load)
          if (codeOutlineItems.length >= 2) {
            renderCodeOutline(codeOutlineItems);
            // Show sidebar on initial display render (same behavior as markdown buildTOC)
            leftSidebar.classList.remove('hidden');
            updateGridColumns();
          }
          updatePlainTextDynamicButtons();
        }

      // Load completed feedback items from API
      loadCompletedFeedback();

    } catch (e) {
      const loadingEl3 = document.querySelector('.preview-loading');
      if (loadingEl3) loadingEl3.remove();
      contentBody.innerHTML = `<div class="preview-error">加载失败: ${escHtml(e.message)}</div>`;
    }
  }

  // ============ Sidebar Toggle (Grid Adaptive) ============
  const leftSidebar = document.getElementById('leftSidebar');
  const rightSidebar = document.getElementById('rightSidebar');
  const threeCol = document.querySelector('.preview-three-col');

  function updateGridColumns() {
    const lHidden = leftSidebar.classList.contains('hidden');
    const rHidden = rightSidebar.classList.contains('hidden');
    const lW = lHidden ? '0px' : '240px';
    const rW = rHidden ? '0px' : '300px';
    threeCol.style.gridTemplateColumns = `${lW} 1fr ${rW}`;

    // v1.10 D2: toggle the mask overlay + content shift classes when a
    // sidebar is open. Desktop already shows all columns in the grid,
    // so the mask is mobile-only (the CSS hides .preview-mask on >= 768px
    // by inheriting the existing grid layout). Mask clicking closes
    // whichever sidebar is open.
    const mask = document.getElementById('sidebarMask');
    if (mask) {
      const anyOpen = !lHidden || !rHidden;
      if (anyOpen) {
        mask.classList.add('active');
        threeCol.classList.toggle('sidebar-left-open', !lHidden);
        threeCol.classList.toggle('sidebar-right-open', !rHidden);
      } else {
        mask.classList.remove('active');
        threeCol.classList.remove('sidebar-left-open');
        threeCol.classList.remove('sidebar-right-open');
      }
    }
  }

  // v1.10 D2: clicking the mask closes whichever sidebar is open.
  // The mobile breakpoint (@media max-width 767.98px) places the sidebars
  // in fixed positioning, so the mask is meaningful only on phones.
  // On desktop the mask is hidden by CSS; this listener is a no-op there.
  // v1.11 G4: route through UIState.set('idle') to keep the state machine
  // consistent.
  const _sidebarMask = document.getElementById('sidebarMask');
  if (_sidebarMask) {
    _sidebarMask.addEventListener('click', () => {
      if (typeof UIState !== 'undefined' && UIState) {
        UIState.set('idle');
      } else {
        const wasLeftOpen = !leftSidebar.classList.contains('hidden');
        const wasRightOpen = !rightSidebar.classList.contains('hidden');
        if (wasLeftOpen) {
          leftSidebar.classList.add('hidden');
          document.getElementById('btnCodeOutline')?.classList.remove('active');
          document.getElementById('btnOutline')?.classList.remove('active');
          if (typeof updateMarkdownDynamicButtons === 'function') updateMarkdownDynamicButtons();
          if (typeof updatePlainTextDynamicButtons === 'function') updatePlainTextDynamicButtons();
        }
        if (wasRightOpen) {
          rightSidebar.classList.add('hidden');
          document.getElementById('btnToggleRight')?.classList.remove('active');
        }
        updateGridColumns();
      }
    });
  }

  // Left sidebar: markdown shows it (via buildTOC), non-markdown hides it
  if (!isMarkdownMode) {
    leftSidebar.classList.add('hidden');
  } else {
    leftSidebar.classList.remove('hidden');
  }
  rightSidebar.classList.remove('hidden');
  updateGridColumns();

  // ============ Image Mode Detection ============
  const isImageMode = ['png', 'jpg', 'jpeg', 'svg'].includes(ext);

  // ============ Image / Media Mode Toolbar Setup ============
  function setupMediaToolbar() {
    // Hide left sidebar in media mode (no TOC for media)
    leftSidebar.classList.add('hidden');
    updateGridColumns();

    const dyn = document.getElementById('bottombarDynamic');
    const sep = document.getElementById('bottombarDynamicSep');
    if (sep) sep.style.display = '';
    if (dyn) dyn.style.display = 'flex';
    // Build image nav buttons only in image mode (audio/video have their own buildMediaToolbar)
    if (dyn && IMAGE_EXTS.includes(ext)) {
      buildImageNav();
    }
  }

  // ============ Image prev/next navigation (H1 v1.7) ============
  const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'svg', 'gif', 'webp', 'bmp'];

  function buildImageNav() {
    const dyn = document.getElementById('bottombarDynamic');
    if (!dyn) return;
    // Reset dynamic area for image nav
    dyn.innerHTML = '';
    // Prev button
    const prevBtn = document.createElement('button');
    prevBtn.className = 'preview-bottom-btn';
    prevBtn.id = 'imgNavPrev';
    prevBtn.title = '上一张图片（←）';
    prevBtn.textContent = '◀ 上一张';
    prevBtn.disabled = true;
    prevBtn.addEventListener('click', () => navigateImage('prev'));
    dyn.appendChild(prevBtn);
    // Counter
    const counter = document.createElement('span');
    counter.className = 'img-nav-counter';
    counter.id = 'imgNavCounter';
    counter.textContent = '– / –';
    dyn.appendChild(counter);
    // Next button
    const nextBtn = document.createElement('button');

  async function loadImageNav() {
    // Only meaningful in image mode
    if (!IMAGE_EXTS.includes(ext) || !rootId || !filePath) return;
    const prevBtn = document.getElementById('imgNavPrev');
    const nextBtn = document.getElementById('imgNavNext');
    const counter = document.getElementById('imgNavCounter');
    if (!prevBtn || !nextBtn || !counter) return;
    try {
      const res = await fetch(`/api/clawmate/list/navigation?root=${encodeURIComponent(rootId)}&path=${encodeURIComponent(filePath)}`);
      if (!res.ok) return;
      const data = await res.json();
      const total = data.total || 0;
      const hasPrev = !!data.prev;
      const hasNext = !!data.next;
      // Backend exposes current.index (0-based) + total; show "1 / N" simple numeric format
      const curIdx = (data.current && typeof data.current.index === 'number') ? data.current.index : 0;
      counter.textContent = `${curIdx + 1} / ${total}`;
      prevBtn.disabled = !hasPrev;
      nextBtn.disabled = !hasNext;
      // Store target paths on buttons for click handler
      prevBtn.dataset.path = hasPrev ? data.prev.path : '';
      nextBtn.dataset.path = hasNext ? data.next.path : '';

      counter.textContent = '导航加载失败';
    }

  function navigateImage(direction) {
    const btn = document.getElementById(direction === 'prev' ? 'imgNavPrev' : 'imgNavNext');
    if (!btn || btn.disabled) return;
    const targetPath = btn.dataset.path;
    if (!targetPath) return;
    // Update URL via pushState so browser back/forward works
    const newUrl = `?root=${encodeURIComponent(rootId)}&file=${encodeURIComponent(targetPath)}`;
    history.pushState({ root: rootId, file: targetPath }, '', newUrl);
    // Update module-level filePath/fileName and reload content
    filePath = targetPath;
    fileName = filePath.split('/').pop();
    loadContent();
  }

  // Browser back/forward navigation support
  window.addEventListener('popstate', (e) => {
    if (!e.state || !e.state.file) {
      // No state means initial load — ignore
      return;
    }
    if (e.state.root !== rootId) {
      // Different root: do a full navigation
      window.location.href = `?root=${encodeURIComponent(e.state.root)}&file=${encodeURIComponent(e.state.file)}`;
      return;
    }
    filePath = e.state.file;
    fileName = filePath.split('/').pop();
    loadContent();
  });

  // Replace initial state so popstate fires with our data
