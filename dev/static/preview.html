<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./asset/clawmate-logo.png" />
  <title>预览 — ClawMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css?v=20260620a" />
  <link rel="stylesheet" href="./vendor/github-markdown-dark.min.css" id="github-markdown-css" />
  <!-- KaTeX CSS loaded conditionally by preview.js -->
  <link rel="stylesheet" href="./vendor/github.min.css" id="highlight-theme-css" />
  <link rel="stylesheet" href="./css/preview.css?v=20260621a">
</head>
<body>
  <div class="preview-app">
    <!-- Topbar -->
    <header class="topbar">
      <a class="mobile-back-btn" id="btnBackMobile" href="" title="返回">←</a>
      <span class="brand"><img src="./asset/clawmate-logo.png" alt="" width="28" height="28" style="flex-shrink:0;" />ClawMate</span>
      <span class="preview-topbar-title" id="docTitle">加载中...</span>
      <div class="topbar-actions">
        <button class="topbar-btn" id="btnToggleLeft" title="切换大纲面板">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
        </button>
        <button class="topbar-btn" id="btnToggleRight" title="切换反馈面板">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="topbar-btn" id="themeToggle" title="切换主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
        <button class="topbar-btn" id="btnLogout" title="退出登录">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Three-column body -->
    <div class="preview-three-col">
      <!-- Left: TOC / Outline -->
      <aside class="preview-left" id="leftSidebar">
        <div class="preview-left-header"><span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg> 大纲</span><button class="panel-close-btn" id="btnCloseLeft" title="关闭面板"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
        <div class="preview-left-body" id="tocBody">
          <div class="preview-toc-empty">非 Markdown，无大纲</div>
        </div>
      </aside>

      <!-- Center: Content -->
      <main class="preview-center">
        <div class="preview-center-body" id="contentBody">
          <div class="preview-loading">加载中...</div>
        </div>
        <!-- Subtitle / media panels (hidden by default) -->
        <div class="subtitle-sync-panel hidden" id="subtitleSyncPanel"></div>
      </main>

      <!-- Right: Feedback Panel -->
      <aside class="preview-right" id="rightSidebar">
        <div class="preview-right-header"><span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 反馈</span><button class="panel-close-btn" id="btnCloseRight" title="关闭面板"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button></div>
        <div class="preview-right-body" id="feedbackBody">
          <div class="fb-empty">选中文本后点击「<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> 加入面板」即可累积</div>
        </div>
      </aside>
    </div>

    <!-- Bottom toolbar -->
    <div class="preview-bottombar">
      <a class="preview-bottom-btn" id="btnBack" title="返回目录"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> 返回</a>
      <div class="preview-btn-group"><button class="preview-bottom-btn" id="btnPath" title="复制绝对路径"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg> 路径</button><button class="preview-bottom-btn" id="btnPdf" title="导出"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M4 7V4a2 2 0 0 1 2-2h8.5L20 7.5V20a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3"/><path d="M4 14h6"/><path d="m7 11-3 3 3 3"/></svg> 导出</button><button class="preview-bottom-btn" id="btnDownload" title="下载文件"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> 下载</button><button class="preview-bottom-btn" id="btnRename" title="重命名"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg> 重命名</button><button class="preview-bottom-btn" id="btnShare" title="生成分享链接"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg> 分享</button></div>
      <!-- Dynamic zone: image/audio/video modules populate this -->
      <div id="bottombarDynamic" style="display:flex;align-items:center;gap:4px;"></div>
      <div class="preview-btn-group" id="bottombarEditGroup"></div>
      <div class="preview-bottom-divider" style="flex:1"></div>
      <button class="preview-bottom-btn danger" id="btnDelete" title="删除文件"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg> 删除</button>
    </div>
  </div>

  <!-- Mobile selection floating button -->
  <div class="mobile-sel-btn" id="mobileSelBtn" style="display:none;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg> 反馈</div>

  <!-- Selection tooltip -->
  <div class="preview-selection-tooltip" id="selectionTooltip">
    <div class="pst-header"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> 反馈选中内容</div>
    <div class="pst-location-row">
      <input type="text" id="pstLocationInput" class="pst-location" placeholder="位置：选择后自动识别" style="flex:1;" />
    </div>
    <textarea class="pst-note" id="pstNote" placeholder="必填 · 简要说明需要的改动" rows="3"></textarea>
    <div class="pst-tags" id="pstTags"></div>
    <div class="pst-actions">
      <button class="pst-btn-add" id="pstBtnAdd"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> 加入待办</button>
      <button class="pst-btn-send" id="pstBtnSend"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg> 立刻执行</button>
    </div>
    <div class="pst-status" id="pstStatus"></div>
  </div>

  <!-- Toast -->
  <div class="preview-toast" id="toast" style="display:none;"></div>

  <!-- Subtitle extraction progress modal -->
  <div id="subtitleExtractModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.45);align-items:center;justify-content:center;">
    <div style="background:var(--bg-secondary,#fff);border:1px solid var(--border-color,#ddd);border-radius:12px;padding:24px 28px;min-width:340px;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,0.2);font-family:inherit;">
      <div id="subtitleExtractModalTitle" style="font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text-primary,#1f1f1f);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> 正在提取字幕...</div>
      <div id="subtitleExtractProgressBar" style="height:8px;background:var(--bg-tertiary,#e5e7eb);border-radius:4px;overflow:hidden;margin-bottom:10px;">
        <div id="subtitleExtractProgressFill" style="height:100%;width:0%;background:var(--accent,#6366f1);border-radius:4px;transition:width 0.3s;"></div>
      </div>
      <div id="subtitleExtractProgressText" style="font-size:12px;color:var(--text-secondary,#6b7280);margin-bottom:4px;">准备中...</div>
      <div id="subtitleExtractProgressPct" style="font-size:11px;color:var(--text-muted,#9ca3af);">0%</div>
      <div id="subtitleExtractError" style="display:none;margin-top:12px;padding:10px;background:var(--danger-bg,#fee2e2);border:1px solid var(--danger-border,#fca5a5);border-radius:6px;font-size:12px;color:var(--danger,#dc2626);"></div>
      <button id="subtitleExtractCancelBtn" style="margin-top:16px;width:100%;padding:8px 16px;border-radius:6px;border:1px solid var(--border-color,#d1d5db);background:var(--btn-bg,#f3f4f6);color:var(--btn-text,#374151);cursor:pointer;font-size:13px;">取消</button>
    </div>
  </div>

  <!-- Mobile bottom feedback add panel -->
  <div class="mobile-fb-overlay" id="mobileFbOverlay"></div>
  <div class="mobile-fb-panel" id="mobileFbPanel">
    <div class="mobile-fb-header">
      <span>添加反馈</span>
      <button class="mobile-fb-close" id="mobileFbClose"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="mobile-fb-body">
      <div class="mobile-fb-selection" id="mobileFbSelection"></div>
      <textarea class="mobile-fb-note" id="mobileFbNote" placeholder="简要说明需要的改动"></textarea>
      <div class="mobile-fb-tags" id="mobileFbTags"></div>
      <button class="mobile-fb-submit" id="mobileFbSubmit">提交反馈</button>
      <div class="mobile-fb-status" id="mobileFbStatus"></div>
    </div>
  </div>

  <!-- Vendor scripts (KaTeX/Mermaid loaded conditionally) -->
  <script src="./vendor/purify.min.js" defer></script>
  <script src="./vendor/markdown-it.min.js" defer></script>
  <script src="./vendor/markdown-it-container.min.js" defer></script>
  <script src="./vendor/markdown-it-emoji.min.js" defer></script>
  <script src="./vendor/markdown-it-footnote.min.js" defer></script>
  <script src="./vendor/markdown-it-task-lists.min.js" defer></script>
  <script src="./vendor/highlight.min.js" defer></script>
  <script src="./js/icons.js?v=20260620a" defer></script>
  <script src="./js/preview-common.js" defer></script>
  <script src="./js/preview.js?v=20260620a" defer></script>
</body>
</html>
