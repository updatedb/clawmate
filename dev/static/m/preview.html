<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <link rel="icon" href="data:," />
  <title>预览 — ClawMate</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="highlight-theme-css" />
  <link rel="stylesheet" href="../vendor/github-markdown-dark.min.css" id="github-markdown-css" />
  <link rel="stylesheet" href="../vendor/katex.min.css" />
  <style>
    /* Markdown-body overrides for mobile */
    .m-content .markdown-body {
      background: transparent !important;
    }
    .m-content .markdown-body pre {
      overflow-x: auto;
      max-width: 100%;
      position: relative;
    }
    .m-content .markdown-body table {
      display: block;
      overflow-x: auto;
      max-width: 100%;
    }
    .m-content .markdown-body img {
      max-width: 100%;
      height: auto;
    }
    .m-content .markdown-body svg {
      max-width: 100%;
      height: auto;
    }
    .m-content .markdown-body table code {
      word-break: break-all;
      overflow-wrap: anywhere;
    }
    /* Mermaid zoom controls */
    .mermaid-zoom-controls {
      display: none;
      position: absolute;
      top: 4px;
      right: 4px;
      gap: 4px;
      z-index: 5;
    }
    .mermaid:hover .mermaid-zoom-controls,
    .mermaid-zoomed .mermaid-zoom-controls {
      display: flex;
    }
    .mermaid-zoom-btn {
      min-width: 32px;
      min-height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dark mode for markdown */
    @media (prefers-color-scheme: light) {
      .m-content .markdown-body {
        color: #1f2328;
      }
    }
    @media (prefers-color-scheme: dark) {
      .m-content .markdown-body {
        color: #e6edf3;
      }
    }
  </style>
</head>
<body>
  <div class="m-app" id="app">
    <!-- Topbar -->
    <header class="m-topbar" id="topbar">
      <a class="m-back-btn" id="btnBack">←</a>
      <span class="m-topbar-title" id="docTitle">加载中...</span>
    </header>

    <!-- Content -->
    <div class="m-content" id="contentBody">
      <div class="m-loading">加载中...</div>
    </div>

    <!-- Bottom bar -->
    <div class="m-bottombar" id="bottombar">
      <button class="m-bottom-btn" id="btnBottomOutline">📑 大纲</button>
      <button class="m-bottom-btn" id="btnBottomFeedback">💬 反馈</button>
      <button class="m-bottom-btn" id="btnShare" title="分享">↗️ 分享</button>
    </div>
  </div>



  <!-- Outline panel -->
  <div class="m-panel-overlay" id="outlineOverlay"></div>
  <div class="m-panel" id="outlinePanel" style="max-height:60vh;">
    <div class="m-panel-handle"></div>
    <div class="m-panel-header">
      <span class="m-panel-title">📑 大纲</span>
      <button class="m-panel-close" id="outlineClose">✕</button>
    </div>
    <div class="m-panel-body" id="outlineBody"></div>
  </div>

  <!-- Feedback panel -->
  <div class="m-panel-overlay" id="feedbackOverlay"></div>
  <div class="m-panel" id="feedbackPanel" style="max-height:50vh;">
    <div class="m-panel-handle"></div>
    <div class="m-panel-header">
      <span class="m-panel-title" id="feedbackPanelTitle">💬 反馈</span>
      <button class="m-panel-close" id="feedbackClose">✕</button>
    </div>
    <div class="m-panel-body" id="feedbackBody">
      <div class="m-file-empty">选择文本后可添加反馈</div>
    </div>
    <div class="m-panel-footer" style="text-align:center;font-size:12px;color:var(--text-muted);padding:8px 16px;">
      选择文本后可在选区上方添加反馈
    </div>
  </div>

  <!-- Selection tooltip (floating button above selected text) -->
  <div class="m-selection-tooltip" id="selectionTooltip">
    <button class="m-sel-tag" id="tooltipFeedbackBtn" title="添加反馈">✏️ 反馈</button>
  </div>

  <!-- Feedback input (shown inline in feedback panel when submitting) -->
  <div class="m-panel" id="feedbackInputPanel" style="max-height:60vh;">
    <div class="m-panel-handle"></div>
    <div class="m-panel-header">
      <span class="m-panel-title">添加反馈</span>
      <button class="m-panel-close" id="feedbackInputClose">✕</button>
    </div>
    <div class="m-fb-input">
      <div class="m-fb-input-label">选中内容</div>
      <div class="m-fb-input-selection" id="fbInputSelection"></div>
      <div class="m-fb-input-label">你的意见</div>
      <textarea class="m-fb-textarea" id="fbInputNote" placeholder="简要说明需要的改动"></textarea>
      <div class="m-fb-tags" id="fbInputTags"></div>
      <button class="m-fb-submit" id="fbInputSubmit">提交反馈</button>
      <div id="fbInputStatus" style="font-size:12px;color:var(--text-muted);padding-top:4px;"></div>
    </div>
  </div>

  <!-- Immersive hint -->
  <div class="m-immersive-hint" id="immersiveHint" style="display:none;">再次点击退出阅读模式</div>

  <!-- Toast -->
  <div class="m-toast" id="toast" style="display:none;"></div>

  <!-- Vendor scripts -->
  <script src="../vendor/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-container/dist/markdown-it-container.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-emoji/dist/markdown-it-emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote/dist/markdown-it-footnote.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists/dist/markdown-it-task-lists.min.js"></script>
  <script src="../vendor/highlight.min.js"></script>
  <script src="../vendor/katex.min.js"></script>
  <script src="../vendor/auto-render.min.js"></script>
  <script src="../vendor/mermaid-v11.min.js"></script>

<script>
(function() {
  'use strict';

  const API_BASE = '/api/clawmate';

  // ── URL Params ──
  const params = new URLSearchParams(location.search);
  const rootId = params.get('root') || '';
  const filePath = params.get('file') || '';
  const fileName = filePath.split('/').pop() || '未命名';
  const project = filePath.includes('/') ? filePath.split('/')[0] : rootId;

  const MARKDOWN_EXTS = ['md', 'markdown'];
  const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'svg', 'webp', 'gif', 'bmp', 'ico'];
  const AUDIO_EXTS = ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a', 'wma'];
  const VIDEO_EXTS = ['mp4', 'webm', 'mov', 'avi', 'mkv', 'wmv', 'flv', 'm4v'];
  const OFFICE_EXTS = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'odt', 'ods', 'odp'];
  const PLAIN_TEXT_EXTS = ['txt', 'csv', 'yaml', 'yml', 'py', 'js', 'ts', 'tsx', 'css', 'sh', 'bash', 'sql', 'toml', 'ini', 'conf', 'cfg', 'env', 'xml', 'gpx', 'kml', 'srt', 'log'];
  const ext = fileName.includes('.') ? fileName.split('.').pop().toLowerCase() : '';
  const CODE_EXTS = ['py', 'js', 'ts', 'tsx', 'html', 'css', 'scss', 'less', 'sh', 'bash', 'sql', 'go', 'rs', 'java', 'rb', 'php', 'c', 'cpp', 'h', 'hpp', 'swift', 'kt', 'scala', 'lua', 'r', 'pl', 'pm', 'hs'];
  const isCode = CODE_EXTS.includes(ext);
  const isJson = ext === 'json';
  const isImage = IMAGE_EXTS.includes(ext);
  const isOfficePdf = OFFICE_EXTS.includes(ext) || ext === 'pdf';
  const isMarkdown = MARKDOWN_EXTS.includes(ext);
  const isPlainText = PLAIN_TEXT_EXTS.includes(ext);
  const isAudio = AUDIO_EXTS.includes(ext);
  const isVideo = VIDEO_EXTS.includes(ext);

  let rawContent = '';
  let mermaidStore = [];
  let selections = []; // pending feedback selections
  let currentSelectionText = '';
  let currentSelectionStart = 0;
  let currentSelectionEnd = 0;
  let currentPosition = '';
  let pendingSelectionText = '';
  let pendingRange = null;
  let pendingStartLine = 0;
  let pendingEndLine = 0;

  // TOC items (outline)
  let tocItems = [];

  // Feedback items loaded
  let feedbackItems = [];

  document.title = fileName + ' — ClawMate';
  document.getElementById('docTitle').textContent = fileName;

  // ── Elements ──
  const els = {
    contentBody: document.getElementById('contentBody'),
    btnBack: document.getElementById('btnBack'),
    btnShare: document.getElementById('btnShare'),
    btnBottomOutline: document.getElementById('btnBottomOutline'),
    btnBottomFeedback: document.getElementById('btnBottomFeedback'),
    outlineOverlay: document.getElementById('outlineOverlay'),
    outlinePanel: document.getElementById('outlinePanel'),
    outlineBody: document.getElementById('outlineBody'),
    outlineClose: document.getElementById('outlineClose'),
    feedbackOverlay: document.getElementById('feedbackOverlay'),
    feedbackPanel: document.getElementById('feedbackPanel'),
    feedbackBody: document.getElementById('feedbackBody'),
    feedbackClose: document.getElementById('feedbackClose'),
    feedbackPanelTitle: document.getElementById('feedbackPanelTitle'),
    feedbackInputPanel: document.getElementById('feedbackInputPanel'),
    feedbackInputClose: document.getElementById('feedbackInputClose'),
    fbInputSelection: document.getElementById('fbInputSelection'),
    fbInputNote: document.getElementById('fbInputNote'),
    fbInputTags: document.getElementById('fbInputTags'),
    fbInputSubmit: document.getElementById('fbInputSubmit'),
    fbInputStatus: document.getElementById('fbInputStatus'),
    immersiveHint: document.getElementById('immersiveHint'),
    toast: document.getElementById('toast'),
    selectionTooltip: document.getElementById('selectionTooltip'),
    tooltipFeedbackBtn: document.getElementById('tooltipFeedbackBtn'),
  };
  // ── Theme: follow system preference ──
  function switchMdTheme(resolved) {
    const mdCss = document.getElementById("github-markdown-css");
    const hlCss = document.getElementById("highlight-theme-css");
    if (resolved === "dark") {
      mdCss.href = "../vendor/github-markdown-dark.min.css";
      hlCss.href = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css";
    } else {
      mdCss.href = "../vendor/github-markdown-light.min.css";
      hlCss.href = "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";
    }
  }
  (function initTheme() {
    const dark = window.matchMedia("(prefers-color-scheme: dark)");
    switchMdTheme(dark.matches ? "dark" : "light");
    dark.addEventListener("change", function(e) {
      switchMdTheme(e.matches ? "dark" : "light");
    });
  })();

  // ── Back button ──
  const parentDir = filePath.includes('/') ? filePath.split('/').slice(0, -1).join('/') : '';
  const paramsStr = 'root=' + encodeURIComponent(rootId) + (parentDir ? '&dir=' + encodeURIComponent(parentDir) : '');
  els.btnBack.href = 'index.html?' + paramsStr;

  // ── Toast ──
  function showToast(msg, duration) {
    const el = els.toast;
    el.textContent = msg;
    el.style.display = 'block';
    el.style.opacity = '1';
    clearTimeout(el._timer);
    el._timer = setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => { el.style.display = 'none'; }, 300);
    }, duration || 2000);
  }

  // ── Utility ──
  function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Panel helpers ──
  function showPanel(overlay, panel) {
    overlay.classList.add('visible');
    panel.classList.add('visible');
  }
  function hidePanel(overlay, panel) {
    overlay.classList.remove('visible');
    panel.classList.remove('visible');
  }

  // ── Markdown Renderer ──
  if (window.hljs) hljs.configure({ ignoreUnescapedHTML: true });

  function createMarkdownRenderer() {
    let mermaidIdx = 0;

    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: true,
      breaks: true,
    })
      .use(window.markdownitContainer, 'note')
      .use(window.markdownitContainer, 'warning')
      .use(window.markdownitContainer, 'tip')
      .use(window.markdownitEmoji)
      .use(window.markdownitFootnote)
      .use(window.markdownitTaskLists, { enabled: true, label: true, labelAfter: true });

    // Rewrite relative image paths
    md.renderer.rules.image = function(tokens, idx, options, env, slf) {
      const token = tokens[idx];
      let href = token.attrGet('src') || '';
      const title = token.attrGet('title') || '';
      const text = token.content || '';
      if (!/^https?:\/\//i.test(href) && !href.startsWith('/')) {
        const dir = filePath.includes('/') ? filePath.split('/').slice(0, -1).join('/') : '';
        const fullPath = dir ? dir + '/' + href : href;
        href = '/api/clawmate/preview?root=' + encodeURIComponent(rootId) + '&path=' + encodeURIComponent(fullPath);
      }
      return '<img src="' + href + '" alt="' + escHtml(text) + '"' + (title ? ' title="' + escHtml(title) + '"' : '') + '>';
    };

    // Fenced code blocks (mermaid + highlighting)
    md.renderer.rules.fence = function(tokens, idx, options, env, slf) {
      const token = tokens[idx];
      const language = token.info.trim();
      const raw = token.content;
      const className = language ? 'language-' + language : '';

      if (language === 'mermaid') {
        const id = mermaidIdx++;
        mermaidStore[id] = raw;
        return '<div class="mermaid" data-mermaid-id="' + id + '"></div>';
      }

      if (language && window.hljs) {
        try {
          const langMap = { yml: 'yaml', node: 'javascript', 'node.js': 'javascript', py: 'python', sh: 'bash', markdown: 'md', text: 'plaintext' };
          const normalLang = langMap[language.toLowerCase()] || language;
          const plain = raw.replace(/<[^>]*>/g, '');
          const highlighted = hljs.highlight(plain, { language: normalLang, ignoreIllegals: true }).value;
          return '<pre class="hljs" data-highlighted="yes"><code class="' + className + '">' + highlighted + '</code></pre>';
        } catch (_) {}
      }
      return '<pre><code class="' + className + '">' + escHtml(raw) + '</code></pre>';
    };

    return md;
  }

  // ── Build TOC from rendered content ──
  function buildTOC(div) {
    const headings = div.querySelectorAll('h1, h2, h3, h4');
    tocItems = [];
    if (headings.length < 1) return;

    headings.forEach((h, i) => {
      if (!h.id) h.id = 'heading-' + i;
      const level = parseInt(h.tagName[1]);
      tocItems.push({ id: h.id, text: h.textContent, level: level, element: h });
    });
  }

  // ── Code outline: parse function/class definitions ──
  function buildCodeOutline(rawContent, ext) {
    var lines = rawContent.split('\n');
    var items = [];
    var patterns = {
      py: [
        [/^\s*def\s+(\w+)\s*\(/, function(m) { return 'def ' + m[1] + '(...)'; }],
        [/^\s*class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*async\s+def\s+(\w+)\s*\(/, function(m) { return 'async def ' + m[1] + '(...)'; }],
      ],
      js: [
        [/^\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
        [/^\s*(?:export\s+)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*(?:static\s+)?(?:async\s+)?(\w+)\s*\([^)]*\)\s*\{/, function(m) { return m[1] + '()'; }, true],
      ],
      ts: [
        [/^\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/, function(m) { return 'function ' + m[1] + '()'; }],
        [/^\s*(?:export\s+)?(?:abstract\s+)?class\s+(\w+)/, function(m) { return 'class ' + m[1]; }],
        [/^\s*(?:export\s+)?interface\s+(\w+)/, function(m) { return 'interface ' + m[1]; }],
      ],
      html: [
        [/^\s*<h([1-6])\b[^>]*>(.*?)<\/h\1>/, function(m) { return m[2].replace(/<[^>]*>/g,''); }, 'skip'],
      ],
      go: [
        [/^\s*func\s+(\(\w+\s+\*?\w+\)\s+)?(\w+)\s*\(/, function(m) { return 'func ' + (m[1]||'') + ' ' + m[2] + '(...)'; }],
        [/^\s*type\s+(\w+)\s+(?:struct|interface)/, function(m) { return 'type ' + m[1]; }],
      ],
      rs: [
        [/^\s*(?:pub\s+)?fn\s+(\w+)/, function(m) { return 'fn ' + m[1] + '()'; }],
        [/^\s*(?:pub\s+)?struct\s+(\w+)/, function(m) { return 'struct ' + m[1]; }],
        [/^\s*(?:pub\s+)?impl\s+(\w+)/, function(m) { return 'impl ' + m[1]; }],
      ],
    };
    var JS_KEYWORDS = {
      'if':1,'else':1,'for':1,'while':1,'switch':1,'case':1,'break':1,'continue':1,'return':1,
      'throw':1,'try':1,'catch':1,'finally':1,'do':1,'with':1,'new':1,'delete':1,'typeof':1,
      'instanceof':1,'void':1,'in':1,'of':1,'await':1,'debugger':1,'export':1,'import':1,
      'yield':1,'super':1,'this':1,'async':1,'true':1,'false':1,'null':1,'undefined':1
    };
    var lang = patterns[ext] || [];
    if (!lang.length) { tocItems = []; return; }
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      for (var j = 0; j < lang.length; j++) {
        var rule = lang[j];
        var m = line.match(rule[0]);
        if (m) {
          if (rule[2] && JS_KEYWORDS[m[1]]) break;
          items.push({ text: rule[1](m).trim(), line: i + 1 });
          break;
        }
      }
    }
    tocItems = items;
  }

  // ── Scroll to code line ──
  function scrollToCodeLine(lineNum) {
    var pre = els.contentBody.querySelector('pre');
    if (!pre) return;
    var lineHeight = parseFloat(getComputedStyle(pre).lineHeight) || 22;
    var scrollTarget = Math.max(0, (lineNum - 4) * lineHeight);
    pre.parentElement.scrollTop = scrollTarget;
  }

  function renderOutlinePanel() {
    const body = els.outlineBody;
    body.innerHTML = '';
    if (tocItems.length === 0) {
      body.innerHTML = '<div class="m-file-empty">无大纲</div>';
      return;
    }
    tocItems.forEach(item => {
      const a = document.createElement('a');
      a.className = 'm-outline-item' + (item.level ? ' level-' + item.level : '');
      a.textContent = item.line ? item.line + '  ' + item.text : item.text;
      a.addEventListener('click', e => {
        e.preventDefault();
        hidePanel(els.outlineOverlay, els.outlinePanel);
        if (item.line) {
          scrollToCodeLine(item.line);
        } else if (item.element) {
          item.element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
      body.appendChild(a);
    });
  }

  // ── Render Mermaid ──
  async function renderMermaid(div) {
    const blocks = div.querySelectorAll('.mermaid');
    if (!blocks.length) return;
    if (!window.mermaid) {
      blocks.forEach(b => { b.textContent = '⚠️ Mermaid 未加载'; });
      return;
    }
    try {
      mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: 'dark' });
      blocks.forEach(b => {
        const id = b.getAttribute('data-mermaid-id');
        if (id != null && mermaidStore[id]) b.textContent = mermaidStore[id];
      });
      await mermaid.run({ querySelector: '.m-content .mermaid' });
    } catch (err) {
      console.warn('Mermaid error:', err);
      blocks.forEach(b => {
        b.classList.add('mermaid-error');
        b.textContent = '⚠️ 图表渲染失败';
      });
    }
  }

  // ── Line number calculation ──
  function getLineNumbersFromRange(text, startOffset, endOffset) {
    const lines = text.split('\n');
    let charCount = 0;
    let startLine = 1, endLine = 1;
    for (let i = 0; i < lines.length; i++) {
      const lineLen = lines[i].length + 1; // +1 for newline
      if (startOffset >= charCount && startOffset < charCount + lineLen) {
        startLine = i + 1;
      }
      if (endOffset >= charCount && endOffset < charCount + lineLen) {
        endLine = i + 1;
        break;
      }
      charCount += lineLen;
    }
    return { startLine, endLine };
  }

  function getPosValue(ext, startLine, endLine) {
    if (!startLine) return '';
    var e = ext ? ext.toLowerCase() : '';
    var rawFormats = ['txt','py','js','ts','tsx','html','css','scss','less','json','xml','yaml','yml','toml','ini','cfg','conf','sh','bash','sql','go','rs','rb','php','c','cpp','h','hpp','swift','kt','scala','lua','r','pl','pm','hs','srt','vtt','log','md','rmd','mdx'];
    if (rawFormats.includes(e)) return 'Line ' + startLine + '-' + endLine;
    if (['docx','doc','pptx','ppt','pdf','odt','odp'].includes(e)) return 'Page ' + startLine + '-' + endLine;
    if (['xlsx','xls','csv','tsv'].includes(e)) return 'Range A' + startLine;
    return 'Line ' + startLine + '-' + endLine;
  }

  function detectSectionFromDOM(range) {
    if (!range) return '';
    var mdBody = document.querySelector('.markdown-body');
    if (!mdBody) return '';
    var node = range.startContainer;
    // Walk up to find heading in ancestor chain
    for (var n = node; n && n !== mdBody; n = n.parentNode) {
      if (/^H[1-6]$/i.test(n.tagName)) {
        return n.textContent.trim().replace(/\s+/g, ' ').slice(0, 80);
      }
    }
    // Walk backward through siblings
    var prev = node;
    while (prev) {
      if (prev.previousSibling) {
        prev = prev.previousSibling;
        if (prev.querySelectorAll) {
          var headings = prev.querySelectorAll('h1,h2,h3,h4,h5,h6');
          if (headings.length > 0) {
            var h = headings[headings.length - 1];
            return h.textContent.trim().replace(/\s+/g, ' ').slice(0, 80);
          }
        }
        if (/^H[1-6]$/i.test(prev.tagName)) {
          return prev.textContent.trim().replace(/\s+/g, ' ').slice(0, 80);
        }
      } else {
        prev = prev.parentNode;
      }
      if (prev === mdBody) break;
    }
    return '';
  }

  // ── Selection → Feedback ──
  let fbOverlay = null; // which overlay is used for feedback input
  let fbPanel = null;

  function showFeedbackInput(selectionText, startLine, endLine, prefillNote, position) {
    currentSelectionText = selectionText;
    currentSelectionStart = startLine;
    currentSelectionEnd = endLine;
    currentPosition = position || '';

    els.fbInputSelection.textContent = selectionText.substring(0, 200);

  }

  function hideFeedbackInput() {

  function showSelectionTooltip(range) {
    // Position tooltip above end of selection
    const rect = range.getBoundingClientRect();
    const tooltip = els.selectionTooltip;
    const top = (rect.bottom || rect.top) + 8;
    const left = Math.min(rect.right, window.innerWidth - 100);
    tooltip.style.top = Math.max(4, top) + 'px';
    tooltip.style.left = Math.max(4, left) + 'px';
    tooltip.classList.add('visible');
  }

  function hideSelectionTooltip() {
    pendingSelectionText = '';
    pendingRange = null;
    els.selectionTooltip.classList.remove('visible');

  // ── Custom selection highlight (CSS Highlight API) ──
  function applySelectionHighlight(range) {
    if (!range) return;
    try {
      if (typeof CSS !== 'undefined' && CSS.highlights) {
        // Remove old highlight
        CSS.highlights.delete('selection-highlight');
        // Apply new highlight
        const h = new Highlight(range);
        CSS.highlights.set('selection-highlight', h);
      }
    } catch (_) {}
  }

  function removeSelectionHighlight() {
    try {
      if (typeof CSS !== 'undefined' && CSS.highlights) {
        CSS.highlights.delete('selection-highlight');
      }
    } catch (_) {}
  }

  async function submitFeedback() {
    const note = els.fbInputNote.value.trim();

      els.fbInputStatus.textContent = '⚠️ 请先选择文本';
      els.fbInputStatus.style.color = 'var(--danger)';

    try {

        task_id: _selectedTaskId || 'review_modify',
        content: currentSelectionText.substring(0, 1000),
        note: note,
        position: currentPosition || getPosValue(ext, currentSelectionStart, currentSelectionEnd),
      };
      const res = await fetch(API_BASE + '/task/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          root: rootId,
          file: filePath,
          selections: [sel],
        }),
      });
      const data = await res.json();

      try {
        const listRes = await fetch(API_BASE + '/list?root=' + encodeURIComponent(rootId) + '&dir=' + encodeURIComponent(parentDir));

        if (currentIdx >= 0) {
          nav.idx = currentIdx + 1;

          if (currentIdx < images.length - 1) nav.next = images[currentIdx + 1];
        }
      } catch (_) {}

      // Set image src
      const imgSrc = API_BASE + '/preview?root=' + encodeURIComponent(rootId) + '&path=' + encodeURIComponent(filePath);
      img.src = imgSrc;

      // Build overlay
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:relative;display:flex;flex-direction:column;align-items:center;width:100%;';

      // Image wrapper for nav clicks
      const imgWrap = document.createElement('div');
      imgWrap.style.cssText = 'display:flex;align-items:center;width:100%;position:relative;justify-content:center;';

      // Prev button
      if (nav.prev) {
        const prevBtn = document.createElement('button');
        prevBtn.innerHTML = '‹';
        prevBtn.className = 'm-img-nav';
        prevBtn.style.cssText = 'left:4px;';

        prevBtn.addEventListener('click', function() {

          window.location.href = url;
        });
        imgWrap.appendChild(prevBtn);
      }

      imgWrap.appendChild(img);

      // Next button
      if (nav.next) {
        const nextBtn = document.createElement('button');
        nextBtn.innerHTML = '›';
        nextBtn.className = 'm-img-nav';
        nextBtn.style.cssText = 'right:4px;';
        const nextPath = nav.next.path || nav.next.relPath || nav.next.name;
        nextBtn.addEventListener('click', function() {
          var url = 'preview.html?root=' + encodeURIComponent(rootId) + '&file=' + encodeURIComponent(nextPath);
          console.log('[nav] navigate to:', url);
          window.location.href = url;
        });
        imgWrap.appendChild(nextBtn);
      }

      overlay.appendChild(imgWrap);

      // Counter + filename
      const info = document.createElement('div');
      info.style.cssText = 'text-align:center;font-size:13px;color:var(--text-secondary);padding:4px 12px 8px;word-break:break-all;';
      info.textContent = fileName + (nav.total > 0 ? ' (' + nav.idx + '/' + nav.total + ')' : '');

    }

    // Audio/Video media
    if (isAudio || isVideo) {
      const mediaSrc = API_BASE + '/preview?root=' + encodeURIComponent(rootId) + '&path=' + encodeURIComponent(filePath);
      body.innerHTML = '';
      body.style.cssText = 'display:flex;align-items:center;justify-content:center;padding:0;';
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'width:100%;max-width:100%;padding:16px;';
      const el = document.createElement(isVideo ? 'video' : 'audio');
      el.src = mediaSrc;
      el.controls = true;
      el.autoplay = false;
      el.preload = 'metadata';
      el.style.cssText = isVideo ? 'width:100%;max-height:60vh;border-radius:8px;background:#000;' : 'width:100%;margin-top:16px;';
      const title = document.createElement('div');
      title.style.cssText = 'text-align:center;font-size:14px;color:var(--text-secondary);margin-bottom:12px;word-break:break-all;';
      title.textContent = fileName;
      wrapper.appendChild(title);
      wrapper.appendChild(el);
      body.appendChild(wrapper);

    }

    // Office / PDF
    if (isOfficePdf) {
      body.innerHTML = '';
      body.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;padding:0;margin:0;';

      iframe.id = 'officeIframe';

      iframe.style.cssText = 'width:100%;height:100%;border:none;overflow:hidden;';
      body.appendChild(iframe);
      return;
    }

    try {
      const res = await fetch(API_BASE + '/preview?root=' + encodeURIComponent(rootId) + '&path=' + encodeURIComponent(filePath));
      if (!res.ok) {
        body.innerHTML = '<div class="m-loading">\u65e0\u6cd5\u52a0\u8f7d\u6587\u4ef6 (' + res.status + ')</div>';
        return;
      }

      // API returns JSON: {meta: ..., content: "..."}
      const data = await res.json();
      rawContent = data.content || '';

      if (isMarkdown) {
        renderMarkdown(rawContent);
      } else if (isJson) {
        renderJsonText(rawContent);
      } else if (isCode) {
        renderCodeText(rawContent, ext);
        buildCodeOutline(rawContent, ext);
      } else {
        renderPlainText(rawContent);
        buildCodeOutline(rawContent, ext);
      }
    } catch (e) {
      body.innerHTML = '<div class="m-loading">\u52a0\u8f7d\u5931\u8d25: ' + e.message + '</div>';

  function renderPlainText(text) {
    const body = els.contentBody;
    body.innerHTML = '';
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.6;margin:0;white-space:pre-wrap;word-break:break-word;';
    const code = document.createElement('code');
    code.textContent = text;
    pre.appendChild(code);
    body.appendChild(pre);
  }

  function renderCodeText(text, lang) {
    const body = els.contentBody;
    body.innerHTML = '';
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.6;margin:0;';
    const code = document.createElement('code');
    try {
      const result = hljs.highlight(text, { language: lang || 'plaintext', ignoreIllegals: true });
      code.innerHTML = result.value;
    } catch (_) {
      code.textContent = text;
    }
    code.className = 'hljs';
    pre.appendChild(code);
    body.appendChild(pre);
  }

  function renderJsonText(text) {
    try {
      const obj = JSON.parse(text);
      text = JSON.stringify(obj, null, 2);
    } catch (_) {}
    const body = els.contentBody;
    body.innerHTML = '';
    const pre = document.createElement('pre');
    pre.style.cssText = 'background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:13px;line-height:1.6;margin:0;';
    const code = document.createElement('code');
    code.textContent = text;
    pre.appendChild(code);
    body.appendChild(pre);
  }

  function renderMarkdown(text) {
    const body = els.contentBody;

    // Create markdown renderer
    mermaidStore = [];
    const md = createMarkdownRenderer();
    let html;
    try {
      html = md.render(text);
    } catch (e) {
      body.innerHTML = '<div class="m-loading">渲染失败，显示纯文本</div>';
      renderPlainText(text);
      return;
    }

    // Wrap in markdown-body
    const div = document.createElement('div');
    div.className = 'markdown-body';
    div.innerHTML = html;
    body.innerHTML = '';
    body.appendChild(div);

    // Build TOC
    buildTOC(div);

    // Add copy buttons
    div.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.code-copy-btn')) return;
      const btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.textContent = '复制';
      btn.style.cssText = 'position:absolute;top:4px;right:4px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:11px;z-index:2;';
      btn.addEventListener('click', async () => {
        const code = pre.querySelector('code');
        const t = code ? code.textContent : pre.textContent;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(t);
          } else {
            const ta = document.createElement('textarea');
            ta.value = t;
            ta.style.cssText = 'position:fixed;left:-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
        } catch (_) {}
        btn.textContent = '已复制';
        setTimeout(() => { btn.textContent = '复制'; }, 1500);
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });

    // Open external links in new tab
    div.querySelectorAll('a').forEach(a => {
      a.setAttribute('target', '_blank');
      a.setAttribute('rel', 'noopener noreferrer');
    });

    // Render mermaid
    if (window.mermaid) {
      renderMermaid(div).then(() => {
        // Setup pinch zoom for mermaid SVGs
        div.querySelectorAll('.mermaid svg').forEach(setupMermaidZoom);
      });
    }

    // Handle KaTeX
    if (window.renderMathInElement) {
      try {
        renderMathInElement(div, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }] });
      } catch (_) {}
    }

    // Handle highlight.js for any code blocks not already highlighted
    if (window.hljs) {
      div.querySelectorAll('pre code:not(.hljs)').forEach(block => {
        try { hljs.highlightElement(block); } catch (_) {}
      });
    }
  }

  // ── Mermaid zoom (mobile friendly) ──
  function setupMermaidZoom(svg) {
    const container = svg.parentElement;
    if (!container) return;
    let scale = 1;
    let lastDist = 0;
    let lastTap = 0;

    container.style.overflow = 'hidden';
    container.style.position = 'relative';

    // Zoom controls
    const controls = document.createElement('div');
    controls.className = 'mermaid-zoom-controls';
    controls.innerHTML = '<button class="mermaid-zoom-btn" data-zoom="out">−</button><button class="mermaid-zoom-btn" data-zoom="reset">⊙</button><button class="mermaid-zoom-btn" data-zoom="in">+</button>';
    container.appendChild(controls);

    controls.addEventListener('click', e => {
      const btn = e.target.closest('.mermaid-zoom-btn');
      if (!btn) return;
      if (btn.dataset.zoom === 'in') { scale = Math.min(3, scale + 0.5); }
      else if (btn.dataset.zoom === 'out') { scale = Math.max(0.5, scale - 0.5); }
      else { scale = 1; }
      svg.style.transform = 'scale(' + scale + ')';
      svg.style.transformOrigin = 'center top';
      container.classList.toggle('mermaid-zoomed', scale !== 1);
    });

    // Pinch zoom
    container.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      }
      // Double tap
      const now = Date.now();
      if (e.touches.length === 1 && now - lastTap < 300) {
        scale = scale >= 2 ? 1 : Math.min(3, scale + 1);
        svg.style.transform = 'scale(' + scale + ')';
        svg.style.transformOrigin = 'center top';
        container.classList.toggle('mermaid-zoomed', scale !== 1);
      }
      lastTap = now;
    }, { passive: true });

    container.addEventListener('touchmove', e => {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const delta = dist / lastDist;
        scale = Math.max(0.5, Math.min(3, scale * delta));
        svg.style.transform = 'scale(' + scale + ')';
        svg.style.transformOrigin = 'center top';
        container.classList.toggle('mermaid-zoomed', scale !== 1);
        lastDist = dist;
      }
    }, { passive: false });
  }

  // ── Selection handler: directly show input panel ──
  let selTimer;
  document.addEventListener('selectionchange', function() {
    if (selTimer) clearTimeout(selTimer);
    selTimer = setTimeout(function() {
    const active = document.activeElement;
    if (active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')) return;
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return;
    const text = sel.toString().trim();
    if (text.length < 2) return;
    const sel2 = window.getSelection();
    if (!sel2 || sel2.isCollapsed || sel2.toString().trim() !== text) return;
    // Store selection data for later use
    pendingSelectionText = text;
    pendingRange = sel.getRangeAt(0);
    const lines = getLineNumbersFromRange(rawContent, pendingRange.startOffset, pendingRange.endOffset);
    pendingStartLine = lines.startLine;
    pendingEndLine = lines.endLine;
    // Show floating tooltip instead of panel
    showSelectionTooltip(pendingRange);
    }, 400);
  });

  // touchend: selection is final when finger lifts
  document.addEventListener('touchend', function() {
    if (selTimer) clearTimeout(selTimer);
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const text = sel.toString().trim();
    if (text.length < 2) return;
    pendingSelectionText = text;
    pendingRange = sel.getRangeAt(0);
    const lines = getLineNumbersFromRange(rawContent, pendingRange.startOffset, pendingRange.endOffset);
    pendingStartLine = lines.startLine;
    pendingEndLine = lines.endLine;
    showSelectionTooltip(pendingRange);
  }, { passive: true });

  // Tooltip button: open feedback panel with stored selection
  els.tooltipFeedbackBtn.addEventListener('click', function() {
    if (!pendingSelectionText) return;
    var text = pendingSelectionText;
    var sl = pendingStartLine;
    var el = pendingEndLine;
    var range = pendingRange;
    // Apply custom highlight before clearing native selection
    if (range) {
      applySelectionHighlight(range);
      // Clear native selection so panel content isn't highlighted
      var sel = window.getSelection();
      if (sel) sel.removeAllRanges();
    }
    hideSelectionTooltip();
    // Compute position: Markdown 渲染模式用 section，否则用行号
    var pos = '';
    if (isMarkdown && range) {
      var heading = detectSectionFromDOM(range);
      if (heading) pos = 'Section ' + heading;
    }
    if (!pos && sl) {
      pos = getPosValue(ext, sl, el);
    }
    showFeedbackInput(text, sl, el, '', pos);
  });

  // Hide tooltip on scroll or tap outside
  document.addEventListener('scroll', hideSelectionTooltip, { passive: true });
  document.addEventListener('touchstart', function(e) {
    const tooltip = els.selectionTooltip;
    if (!tooltip.classList.contains('visible')) return;
    if (!tooltip.contains(e.target)) {
      hideSelectionTooltip();
    }
  }, { passive: true });
  // ── Share button ──
  els.btnShare.addEventListener('click', async function() {
    try {
      var res = await fetch(API_BASE + '/share/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ root: rootId, path: filePath }),
      });
      if (!res.ok) {
        alert('分享链接生成失败 (' + res.status + ')');
        return;
      }
      var data = await res.json();
      showShareToast(data.url, data.expires_str);
    } catch(e) {
      alert('分享出错: ' + e.message);
    }
  });

  function showShareToast(url, expiresStr) {
    var existing = document.querySelector('.share-toast');
    if (existing) existing.remove();

    var toast = document.createElement('div');
    toast.className = 'share-toast';
    toast.innerHTML =
      '<div class="share-toast-header">' +
      '  <span class="share-toast-title">🔗 分享链接已生成</span>' +
      '  <button class="share-toast-close" onclick="this.parentElement.parentElement.remove()">✕</button>' +
      '</div>' +
      '<div class="share-toast-url"><a href="' + url + '" target="_blank" style="color:var(--accent);text-decoration:underline;">' + url + '</a></div>' +
      '<div class="share-toast-hint">⏳ 24 小时有效 · ' + expiresStr + ' 前可访问</div>';
    document.body.appendChild(toast);

    setTimeout(function() {
      if (toast.parentElement) toast.remove();
    }, 15000);
  }

  // ── Init ──
  async function init() {
    await loadTaskTemplates();
    // Load content
    await loadContent();
    // Load feedback count for badge
    try {
      const res = await fetch(API_BASE + '/feedback/list?root=' + encodeURIComponent(rootId) + '&project=' + encodeURIComponent(project) + '&file=' + encodeURIComponent(filePath));
      if (res.ok) {
        const data = await res.json();
        const pending = (data.items || []).filter(i => (i.status || '').toLowerCase() === 'pending').length;
        if (pending > 0) {
          els.feedbackPanelTitle.textContent = '💬 反馈 (' + pending + ')';
        }
      }
    } catch (_) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
