<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="data:," />
  <title>分享 · {{FILE_NAME}} — ClawMate</title>
  <link rel="stylesheet" href="/clawmate/static/m/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="highlight-theme-css" />
  <link rel="stylesheet" href="/clawmate/static/vendor/github-markdown-dark.min.css" id="github-markdown-css" />
  <link rel="stylesheet" href="/clawmate/static/vendor/katex.min.css" />
  <style>
    /* Share page overrides — read-only, no interactions */
    .share-bottombar {
      height: var(--bottombar);
      min-height: var(--bottombar);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      padding-bottom: var(--safe-bottom);
      background: var(--brand-bg);
      color: var(--brand-text);
      font-size: 12px;
      gap: 12px;
      border-top: 1px solid var(--border);
    }
    .share-bottombar .share-expiry {
      opacity: 0.7;
    }
    .share-bottombar .share-brand {
      opacity: 0.5;
    }
    .m-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .m-content .markdown-body {
      background: transparent !important;
    }
    .m-content .markdown-body pre {
      overflow-x: auto;
      max-width: 100%;
      position: relative;
    }
    .m-content .markdown-body table {
      display: block;
      overflow-x: auto;
      max-width: 100%;
    }
    .m-content .markdown-body img {
      max-width: 100%;
      height: auto;
    }
    .m-content .markdown-body svg {
      max-width: 100%;
      height: auto;
    }
    .m-content .markdown-body table code {
      word-break: break-all;
      overflow-wrap: anywhere;
    }
    /* Media wrapper */
    .share-media-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      flex: 1;
    }
    .share-media-wrapper img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .share-media-wrapper video,
    .share-media-wrapper audio {
      width: 100%;
      max-width: 600px;
    }
    .share-media-wrapper video {
      max-height: 60vh;
      border-radius: 8px;
      background: #000;
    }
    .share-media-wrapper audio {
      margin-top: 16px;
    }
    .share-media-title {
      text-align: center;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      word-break: break-all;
    }
    .share-loading {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
      font-size: 15px;
    }
    .share-error {
      text-align: center;
      padding: 48px 16px;
      color: var(--danger);
      font-size: 15px;
    }
    /* Override topbar for share */
    .share-topbar {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: var(--topbar);
      min-height: var(--topbar);
      padding-top: var(--safe-top);
      background: var(--brand-bg);
      color: var(--brand-text);
      gap: 8px;
    }
    .share-topbar .share-title {
      font-size: 16px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="m-app">
    <!-- Top bar — read-only title -->
    <div class="share-topbar">
      <span class="share-title">📄 {{FILE_NAME}}</span>
    </div>

    <!-- Content area -->
    <div class="m-content" id="contentBody">
      <div class="share-loading">加载中...</div>
    </div>

    <!-- Bottom bar — expiry info only -->
    <div class="share-bottombar">
      <span class="share-expiry">⏳ {{EXPIRES_STR}} 前有效</span>
      <span class="share-brand">ClawMate · 只读分享</span>
    </div>
  </div>

  <script src="/clawmate/static/vendor/mermaid-v11.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-container@4.0.0/dist/markdown-it-container.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote/dist/markdown-it-footnote.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <script>
  (function() {
    'use strict';

    const API_BASE = '/api/clawmate';
    const TOKEN = '{{TOKEN}}';
    const FILE_NAME = '{{FILE_NAME}}';

    const ext = FILE_NAME.includes('.') ? FILE_NAME.split('.').pop().toLowerCase() : '';
    const MARKDOWN_EXTS = ['md', 'markdown'];
    const IMAGE_EXTS = ['png', 'jpg', 'jpeg', 'svg', 'webp', 'gif', 'bmp', 'ico'];
    const AUDIO_EXTS = ['mp3', 'wav', 'ogg', 'flac', 'aac', 'm4a', 'wma'];
    const VIDEO_EXTS = ['mp4', 'webm', 'mov', 'avi', 'mkv', 'wmv', 'flv', 'm4v'];
    const OFFICE_EXTS = ['doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx', 'odt', 'ods', 'odp'];

    const isMarkdown = MARKDOWN_EXTS.includes(ext);
    const isImage = IMAGE_EXTS.includes(ext);
    const isAudio = AUDIO_EXTS.includes(ext);
    const isVideo = VIDEO_EXTS.includes(ext);
    const isOfficePdf = OFFICE_EXTS.includes(ext) || ext === 'pdf';

    let mermaidStore = [];

    const body = document.getElementById('contentBody');

    // ── Markdown-it init ──
    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: true,
      breaks: true,
      highlight: function(str, lang) {
        if (lang && lang.toLowerCase() === 'mermaid') {
          const id = mermaidStore.length;
          mermaidStore.push(str);
          return '<div class="mermaid" data-mermaid-id="' + id + '"></div>';
        }
        if (lang && hljs.getLanguage(lang)) {
          try {
            return '<pre class="hljs" style="overflow-x:auto;max-width:100%;padding:12px;border-radius:8px;background:var(--code-bg);"><code>' +
              hljs.highlight(str, { language: lang, ignoreIllegals: true }).value + '</code></pre>';
          } catch (e) {}
        }
        return '<pre class="hljs" style="overflow-x:auto;max-width:100%;padding:12px;border-radius:8px;background:var(--code-bg);"><code>' +
          md.utils.escapeHtml(str) + '</code></pre>';
      }
    });
    md.use(window.markdownitContainer, 'note');
    md.use(window.markdownitContainer, 'tip');
    md.use(window.markdownitContainer, 'warn');
    md.use(window.markdownitContainer, 'danger');
    md.use(window.markdownitFootnote);
    md.use(window.markdownitTaskLists, { enabled: true, label: true, labelAfter: true });

    // ── Render functions ──
    function renderMarkdown(content) {
      body.innerHTML = '<div class="markdown-body">' + md.render(content) + '</div>';

      // Render Mermaid diagrams
      if (window.mermaid && mermaidStore.length > 0) {
        try {
          window.mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'strict' });
          document.querySelectorAll('.mermaid').forEach(function(el) {
            var id = parseInt(el.getAttribute('data-mermaid-id'));
            if (isNaN(id) || !mermaidStore[id]) return;
            var code = mermaidStore[id];
            (async function() {
              try {
                var result = await window.mermaid.render('mermaid-share-' + id, code);
                el.innerHTML = result.svg;
              } catch(e) {
                el.innerHTML = '<pre style="color:var(--danger);font-size:13px;white-space:pre-wrap;">Mermaid 渲染失败: ' + e.message + '</pre>';
              }
            })();
          });
        } catch(e) {
          console.warn('Mermaid init error:', e);
        }
      }

      // Render KaTeX
      try {
        renderMathInElement(body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\\\(', right: '\\\\)', display: false},
            {left: '\\\\[', right: '\\\\]', display: true}
          ],
          throwOnError: false
        });
      } catch(e) {}

      // Highlight code blocks
      body.querySelectorAll('pre code:not(.hljs)').forEach(function(block) {
        hljs.highlightElement(block);
      });

      // Add target="_blank" to external links
      body.querySelectorAll('a[href^="http"]').forEach(function(a) {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener');
      });
    }

    function renderPlainText(content) {
      var pre = document.createElement('pre');
      pre.style.cssText = 'padding:16px;margin:0;overflow-x:auto;font-size:14px;white-space:pre-wrap;word-break:break-word;line-height:1.6;color:var(--text);';
      pre.textContent = content;
      body.innerHTML = '';
      body.appendChild(pre);
    }

    // ── Load content ──
    async function loadContent() {
      try {
        var res = await fetch(API_BASE + '/share/' + TOKEN + '/data');
        if (!res.ok) {
          var err = await res.text();
          body.innerHTML = '<div class="share-error">❌ 加载失败 (' + res.status + ')</div>';
          return;
        }
        var data = await res.json();

        if (isImage) {
          var imgUrl = API_BASE + '/share/' + TOKEN + '/raw';
          body.innerHTML =
            '<div class="share-media-wrapper">' +
            '  <div class="share-media-title">' + data.name + '</div>' +
            '  <img src="' + imgUrl + '" alt="' + data.name + '" />' +
            '</div>';
        } else if (isAudio) {
          var audioUrl = API_BASE + '/share/' + TOKEN + '/raw';
          body.innerHTML =
            '<div class="share-media-wrapper">' +
            '  <div class="share-media-title">' + data.name + '</div>' +
            '  <audio src="' + audioUrl + '" controls preload="metadata" style="width:100%;max-width:600px;"></audio>' +
            '</div>';
        } else if (isVideo) {
          var videoUrl = API_BASE + '/share/' + TOKEN + '/raw';
          body.innerHTML =
            '<div class="share-media-wrapper">' +
            '  <div class="share-media-title">' + data.name + '</div>' +
            '  <video src="' + videoUrl + '" controls preload="metadata" style="width:100%;max-height:60vh;border-radius:8px;background:#000;"></video>' +
            '</div>';
        } else if (isOfficePdf) {
          // Office/PDF — show download link
          body.innerHTML =
            '<div class="share-media-wrapper" style="gap:16px;">' +
            '  <div style="font-size:48px;opacity:0.5;">📄</div>' +
            '  <div class="share-media-title">' + data.name + '</div>' +
            '  <div style="font-size:13px;color:var(--text-muted);">桌面版可预览 Office/PDF 文件</div>' +
            '</div>';
        } else if (isMarkdown) {
          renderMarkdown(data.content || '');
        } else {
          renderPlainText(data.content || '');
        }
      } catch(e) {
        body.innerHTML = '<div class="share-error">❌ 加载出错: ' + e.message + '</div>';
      }
    }

    loadContent();
  })();
  </script>
</body>
</html>
