<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#042f2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" sizes="32x32" href="./asset/clawmate-logo.png" />
  <link rel="apple-touch-icon" href="./asset/clawmate-logo.png" />
  <link rel="manifest" href="./manifest.json" />
  <!-- Anti-flash: apply theme BEFORE first paint -->
  <script>
    (function(){try{var t=localStorage.getItem('clawmate-theme')||'auto';if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}else if(t==='auto'){if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark');}}}catch(e){}})();
  </script>
  <title>登录 — ClawMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo"><img src="./asset/clawmate-logo.png" alt="ClawMate" style="width:64px;height:64px;" /></div>
        <h1 class="login-title">ClawMate</h1>
        <p class="login-subtitle">AI文档评审助手</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">用户名</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="admin"
            autocomplete="username"
            required
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="form-error hidden" id="formError" role="alert"></div>

        <button type="submit" class="btn-login" id="submitBtn">登 录</button>
      </form>

      <div class="login-footer">
        <span class="login-version" id="versionInfo"></span>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.classList.add('hidden');
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? '登录中...' : '登 录';
    }

    function getRedirect() {
      const params = new URLSearchParams(window.location.search);
      return params.get('redirect') || '/clawmate/';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('请输入用户名和密码。');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch('/api/clawmate/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password}),
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          const redirect = getRedirect();
          window.location.href = redirect;
        } else {
          const msg = data.detail || data.error || '登录失败，请检查用户名和密码。';
          showError(msg);
          setLoading(false);
        }
      } catch (err) {
        showError('网络错误，请稍后重试。');
        setLoading(false);
      }
    });
  </script>
</body>
</html>
