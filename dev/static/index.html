<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content" />
  <link rel="icon" type="image/png" sizes="32x32" href="./asset/clawmate-logo.png" />
  <link rel="apple-touch-icon" href="./asset/clawmate-logo.png" />
  <meta name="theme-color" content="#0d9488" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#042f2e" media="(prefers-color-scheme: dark)" />
  <link rel="manifest" href="./manifest.json" />
  <!-- Anti-flash: apply theme BEFORE first paint -->
  <script>
    (function(){try{var t=localStorage.getItem('clawmate-theme')||'auto';if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');}else if(t==='auto'){if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark');}}}catch(e){}})();
  </script>
  <title>ClawMate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./vendor/github-markdown-dark.min.css" id="github-markdown-css" />
  <!-- xterm.js version — keep in sync with agent.js XTERM_VERSION -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button id="hamburgerBtn" class="topbar-btn" aria-label="菜单">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
      <div class="brand"><img src="./asset/clawmate-logo.png" alt="" width="28" height="28" style="flex-shrink:0;" />ClawMate</div>
      <div class="search-group">
        <span class="search-input-wrap">
          <input id="searchInput" type="text" placeholder="搜索文件名" />
          <button id="clearSearchBtn" aria-label="清除搜索">&times;</button>
        </span>
        <button id="searchBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span>搜索</span>
        </button>
      </div>
      <div class="topbar-actions">
        <button id="btnToggleSidebar" class="topbar-btn" title="切换目录面板">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
        </button>
        <button id="btnToggleAgent" class="topbar-btn" title="Agent 终端">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </button>
        <button id="themeToggle" class="topbar-btn" title="切换主题">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
        <button id="btnLogout" class="topbar-btn" title="退出登录">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
        </button>
      </div>
    </header>
    <div class="content">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section-top">
          <select id="rootSelect" style="font-weight:600"></select>
        </div>
        <ul id="dirList" class="dir-list"></ul>
      </aside>
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <main class="main">
        <div class="toolbar">
          <div class="toolbar-top">
            <div id="currentPath" class="path breadcrumb"></div>
          </div>
          <div class="toolbar-bottom">
            <div class="tb-left">
              <select id="filterType">
                <option value="all">全部</option>
                <option value="dir">目录</option>
                <option value="image">图片</option>
                <option value="video">视频</option>
                <option value="audio">音频</option>
                <option value="text">文本</option>
                <option value="other">其他</option>
              </select>
              <button id="sortTime" class="sort-pill active" data-key="time" data-dir="desc">↓ 最新</button>
              <button id="sortName" class="sort-pill" data-key="name" data-dir="asc">↑ 名称</button>
              <button id="sortSize" class="sort-pill" data-key="size" data-dir="desc">↓ 大小</button>
              <button id="multiSelectToggle" title="多选">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <span> 多选</span>
              </button>
              <button id="btnCreate" title="创建">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                <span> 创建</span>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="create-chevron"><path d="m6 9 6 6 6-6"/></svg>
              </button>
            </div>
            <div class="tb-right">
              <button id="viewGrid" class="active" title="画廊视图">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
                <span> 画廊</span>
              </button>
              <button id="viewList" title="列表视图">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></svg>
                <span> 列表</span>
              </button>
            </div>
          </div>
          <div id="status" class="status"><span id="statusText"></span><span id="contentMatchDetailBtn" class="content-match-detail-link hidden"> 查看匹配详情</span></div>
        </div>
        <div class="main-scroll">
          <div id="emptyState" class="empty-state hidden">
            <div class="empty-state-icon">📂</div>
            <h3>此目录为空</h3>
            <p>拖拽文件到此处上传，或使用 <code>Ctrl+V</code> 粘贴剪贴板中的图片</p>
            <p class="empty-hint">也可以通过 Agent 命令让 AI 生成文件到当前目录</p>
          </div>
          <div id="emptySearch" class="empty-state hidden">
            <div class="empty-state-icon">🔍</div>
            <h3>未找到匹配文件</h3>
            <p>尝试其他关键词，或清除搜索查看全部文件</p>
          </div>
          <div id="gallery" class="gallery"></div>
          <div id="list" class="list hidden"></div>
          <!-- IntersectionObserver sentinel for infinite scroll -->
          <div id="scrollSentinel" style="height:1px;"></div>
          <div class="pagination">
            <button id="prevPage">上一页</button>
            <span id="pageInfo"></span>
            <button id="nextPage">下一页</button>
            <button id="loadMoreBtn" style="display:none;margin-top:8px;width:100%;padding:10px;font-size:15px;border:1px dashed var(--border);background:var(--bg);color:var(--text);cursor:pointer;border-radius:6px;">加载更多</button>
          </div>
        </div>
      </main>
      <div id="agentResizeHandle" class="agent-resize-handle hidden"></div>
      <aside id="agentPanel" class="agent-panel hidden">
        <div class="agent-panel-header">
          <select class="agent-backend-select" id="agentBackendSelect">
            <option value="claude">Claude</option>
            <option value="codex">Codex</option>
            <option value="openclaw">OpenClaw</option>
          </select>
          <span class="agent-panel-title" id="agentPanelTitle">Agent</span>
          <button id="btnCloseAgent" class="agent-panel-close" title="关闭 Agent"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
        </div>
        <div id="xtermContainer" class="xterm-container"></div>
        <div id="agentChatView" class="agent-chat-view hidden">
          <div class="agent-chat-messages" id="agentChatMessages"></div>
          <div class="agent-chat-input-wrap">
            <textarea id="agentChatInput" class="agent-chat-input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行。使用 /clawmate project 切换项目"></textarea>
            <button id="agentChatSend" class="agent-chat-send-btn">发送</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- 批量操作栏 -->
  <div id="batchBar" class="batch-bar hidden">
    <div class="batch-bar-inner">
      <span class="batch-count" id="batchCount">已选 0 个文件</span>
      <div class="batch-actions">
        <button id="batchDeleteBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          <span> 批量删除</span>
        </button>
        <button id="batchMoveBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
          <span> 移动到...</span>
        </button>
        <button id="batchDownloadBtn2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="5" x="2" y="3" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
          <span> 批量下载</span>
        </button>
        <button id="batchSelectAllBtn">全选当前页</button>
        <button id="batchClearBtn">取消选择</button>
      </div>
    </div>
  </div>

  <script src="./vendor/purify.min.js" defer></script>
  <script src="./vendor/markdown-it.min.js" defer></script>
  <script src="./vendor/markdown-it-container.min.js" defer></script>
  <script src="./vendor/markdown-it-emoji.min.js" defer></script>
  <script src="./vendor/markdown-it-footnote.min.js" defer></script>
  <script src="./vendor/markdown-it-task-lists.min.js" defer></script>
  <script src="./vendor/highlight.min.js" defer></script>
  <!-- KaTeX + Mermaid loaded conditionally by app.js (CSS+JS) -->
  <!-- xterm.js version — keep in sync with agent.js XTERM_VERSION -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js" defer></script>
  <!-- xterm addons use independent semver (not tied to @xterm/xterm version).
       addon-fit 0.11.0 / addon-webgl 0.19.0 are compatible with xterm 5.x -->
  <script src="./vendor/addon-fit.min.js?v=20260622" defer></script>
  <script src="./js/icons.js" defer></script>
  <script src="./js/topbar.js" defer></script>
  <script src="./js/agent.js" defer></script>
  <script src="./js/app.js?v=1782996122" defer></script>
  <!-- Service Worker registration for PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/clawmate/sw.js').catch(function() {});
    }
    // Reload when restored from bfcache to avoid stale JS/CSS
    window.addEventListener('pageshow', function(e) {
      if (e.persisted) window.location.reload();
    });
  </script>

  <!-- Content match detail modal -->
  <div id="contentMatchModal" class="modal-overlay" style="display:none;">
    <div class="modal-box content-match-modal-box">
      <div class="modal-header">
        <span class="modal-title" id="contentMatchModalTitle">内容匹配详情</span>
        <button class="modal-close" id="contentMatchModalClose" title="关闭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="contentMatchModalBody">
        <div style="text-align:center;color:var(--text-muted);padding:20px;">加载中...</div>
      </div>
      <div class="modal-footer">
        <span id="contentMatchModalCount" style="flex:1;font-size:12px;color:var(--text-secondary);"></span>
        <button id="contentMatchModalClose2" class="btn btn-primary">关闭</button>
      </div>
    </div>
  </div>

  <!-- Directory picker modal (move) -->
  <div id="dirPickerModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="dirPickerTitle">选择目标目录</span>
        <button class="modal-close" id="dirPickerClose" title="关闭">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="dirPickerTree">
        <div style="text-align:center;color:var(--text-muted);padding:20px;">加载中...</div>
      </div>
      <div class="modal-footer">
        <span id="dirPickerSelected" style="flex:1;font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">当前目录</span>
        <button id="dirPickerCancel" class="btn btn-secondary">取消</button>
        <button id="dirPickerConfirm" class="btn btn-primary">确定</button>
      </div>
    </div>
  </div>
</body>
</html>
