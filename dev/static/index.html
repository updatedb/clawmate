<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>ClawMate</title>
  <link rel="stylesheet" href="./css/style.css?v=20260606b" />
  <link rel="stylesheet" href="./vendor/github-markdown-dark.min.css" id="github-markdown-css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button id="hamburgerBtn" aria-label="菜单">☰</button>
      <div class="brand">ClawMate</div>
      <div class="search-group">
        <input id="searchInput" type="text" placeholder="搜索文件名" />
        <button id="searchBtn">搜索</button>
        <button id="clearSearchBtn">清除</button>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" class="topbar-btn" title="切换主题">🌓</button>
        <button id="btnLogout" class="topbar-btn" title="退出登录">🚪</button>
      </div>
    </header>
    <div class="content">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-section-top">
          <select id="rootSelect" style="font-weight:600"></select>
        </div>
        <ul id="dirList" class="dir-list"></ul>
      </aside>
      <main class="main">
        <div class="toolbar">
          <div class="toolbar-top">
            <div id="currentPath" class="path breadcrumb"></div>
          </div>
          <div class="toolbar-bottom">
            <div class="tb-left">
              <label id="filterLabel">类型</label>
              <select id="filterType">
                <option value="all">全部</option>
                <option value="dir">目录</option>
                <option value="image">图片</option>
                <option value="video">视频</option>
                <option value="audio">音频</option>
                <option value="text">文本</option>
                <option value="other">其他</option>
              </select>
              <label>排序</label>
              <button id="sortTime" class="sort-pill active" data-key="time" data-dir="desc">↓ 最新</button>
              <button id="sortName" class="sort-pill" data-key="name" data-dir="asc">↑ 名称</button>
              <button id="sortSize" class="sort-pill" data-key="size" data-dir="desc">↓ 大小</button>
              <button id="multiSelectToggle" title="多选">☐ 多选</button>
            </div>
            <div class="tb-right">
              <button id="viewGrid" class="active">画廊</button>
              <button id="viewList">列表</button>
            </div>
          </div>
          <div id="status" class="status"></div>
        </div>
        <div class="main-scroll">
          <div id="gallery" class="gallery"></div>
          <div id="list" class="list hidden"></div>
          <div class="pagination">
            <button id="prevPage">上一页</button>
            <span id="pageInfo"></span>
            <button id="nextPage">下一页</button>
            <button id="loadMoreBtn" style="display:none;margin-top:8px;width:100%;padding:10px;font-size:15px;border:1px dashed var(--border);background:var(--bg);color:var(--text);cursor:pointer;border-radius:6px;">加载更多</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- 批量操作栏 -->
  <div id="batchBar" class="batch-bar hidden">
    <div class="batch-bar-inner">
      <span class="batch-count" id="batchCount">已选 0 个文件</span>
      <div class="batch-actions">
        <button id="batchDeleteBtn">🗑 批量删除</button>
        <button id="batchDownloadBtn2">📦 批量下载</button>
        <button id="batchSelectAllBtn">全选当前页</button>
        <button id="batchClearBtn">取消选择</button>
      </div>
    </div>
  </div>

  <script src="./vendor/purify.min.js"></script>
  <script src="./vendor/markdown-it.min.js"></script>
  <script src="./vendor/markdown-it-container.min.js"></script>
  <script src="./vendor/markdown-it-emoji.min.js"></script>
  <script src="./vendor/markdown-it-footnote.min.js"></script>
  <script src="./vendor/markdown-it-task-lists.min.js"></script>
  <script src="./vendor/highlight.min.js"></script>
  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="./vendor/katex.min.css">
  <script src="./vendor/katex.min.js"></script>
  <script src="./vendor/auto-render.min.js"></script>
  <!-- Mermaid v11 UMD (同步加载，确保 window.mermaid 在 app.js 执行前可用) -->
  <script src="./vendor/mermaid-v11.min.js"></script>
  <script src="./js/app.js?v=20260606b"></script>
</body>
</html>
