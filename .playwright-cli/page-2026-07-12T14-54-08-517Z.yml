        - generic [ref=f3e772]:
          - generic: "7"
          - code [ref=f3e773]: "> 远程文件管理 · Agent 终端 · 预览反馈闭环 · 多后端协作"
        - generic [ref=f3e774]:
          - generic: "8"
          - code [ref=f3e775]
        - generic [ref=f3e776]:
          - generic: "9"
          - code [ref=f3e777]: <!-- ALL-CLAWMATE-BADGES:START -->
        - generic [ref=f3e778]:
          - generic: "10"
          - code [ref=f3e779]: "[![MIT License](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)"
        - generic [ref=f3e780]:
