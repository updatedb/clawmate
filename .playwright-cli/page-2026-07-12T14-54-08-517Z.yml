        - generic [ref=f3e782]:
          - generic: "12"
          - code [ref=f3e783]
        - generic [ref=f3e784]:
          - generic: "13"
          - code [ref=f3e785]: ClawMate 是 AI Agent 工作流的**一站式中台**，将传统分散的文件管理、内容预览、反馈收集和 AI 编码四个环节整合为一个无缝闭环：
        - generic [ref=f3e786]:
          - generic: "14"
          - code [ref=f3e787]
        - generic [ref=f3e788]:
          - generic: "15"
          - code [ref=f3e789]: 1. **远程文件管理** — 多 root 目录树，覆盖上传、搜索、移动、分享等全生命周期操作
        - generic [ref=f3e790]:
          - generic: "16"
          - code [ref=f3e791]: 2. **全格式预览** — Markdown（Mermaid/KaTeX）、Office（ONLYOFFICE）、PDF、代码高亮、音视频、压缩包等开箱即用
        - generic [ref=f3e792]:
          - generic: "17"
          - code [ref=f3e793]: 3. **即时反馈** — 预览页选中文本即出浮层，填写备注提交，反馈进入 pending→in_progress→done 状态机全程可追溯
        - generic [ref=f3e794]:
          - generic: "18"
          - code [ref=f3e795]:
            - generic [ref=f3e796]: 4. **Agent 自动修复** — 反馈直接路由到活跃的 Agent 终端（PTY 注入或 webhook 唤醒），AI 读取 → 修改 → 保存，闭环完成
        - generic [ref=f3e797]:
          - generic: "19"
          - code [ref=f3e798]:
            - generic [ref=f3e799]: "5. **项目持续迭代** — 五阶段分层计划（Phase I-V）+ CLAWLIST 进度跟踪 + `.clawmate/` marker session 隔离，多项目并行推进"
        - generic [ref=f3e800]:
          - generic: "20"
          - code [ref=f3e801]
        - generic [ref=f3e802]:
          - generic: "21"
          - code [ref=f3e803]:
            - generic [ref=f3e804]: 集成 **Claude Code**、**Codex** 和 **OpenClaw** 三后端 Agent 面板——右上角一键切换，无需修改配置。Claude/Codex 通过 xterm.js PTY 提供完整 CLI 体验（60fps），OpenClaw 通过 Markdown 聊天 + Gateway 协议支持多 Agent 协作。在浏览器中完成从文件浏览到 AI 执行的完整闭环，无需离开 ClawMate。
        - generic [ref=f3e805]:
          - generic: "22"
          - code [ref=f3e806]
        - generic [ref=f3e807]:
          - generic: "23"
          - code [ref=f3e808]: "### Terminal v2 灰度发布"
