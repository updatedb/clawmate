          - code [ref=f1e807]: "终端资源由本地锁定的 `@xterm/xterm@6.0.0` bundle 提供，不依赖运行时 CDN。默认保持兼容路径；在 `agent.terminal_v2` 设为 `true` 后，Claude/Codex 会使用协议 v2（二进制终端数据帧、受限回放及队列），出现问题时将该开关设回 `false` 即可回退。构建资源：`npm ci && npm run build:terminal`。"
