        - generic [ref=f1e770]:
          - generic: "7"
          - code [ref=f1e771]: "> 远程文件管理 · Agent 终端 · 预览反馈闭环 · 多后端协作"
        - generic [ref=f1e772]:
          - generic: "8"
          - code [ref=f1e773]
        - generic [ref=f1e774]:
          - generic: "9"
          - code [ref=f1e775]: <!-- ALL-CLAWMATE-BADGES:START -->
        - generic [ref=f1e776]:
          - generic: "10"
          - code [ref=f1e777]: "[![MIT License](https://img.shields.io/badge/license-MIT-blue.svg)](LICENSE)"
        - generic [ref=f1e778]:
