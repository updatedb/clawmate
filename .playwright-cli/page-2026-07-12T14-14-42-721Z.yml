              - text: — 预览页选中文本即出浮层，填写备注提交，反馈进入 pending→in_progress→done 状态机全程可追溯
            - listitem [ref=f4e148]:
              - strong [ref=f4e149]: Agent 自动修复
              - text: — 反馈直接路由到活跃的 Agent 终端（PTY 注入或 webhook 唤醒），AI 读取 → 修改 → 保存，闭环完成
