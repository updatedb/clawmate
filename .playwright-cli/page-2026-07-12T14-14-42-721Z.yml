            - text: ClawMate 是 AI Agent 工作流的
            - strong [ref=f4e140]: 一站式中台
            - text: ，将传统分散的文件管理、内容预览、反馈收集和 AI 编码四个环节整合为一个无缝闭环：
          - list [ref=f4e141]:
            - listitem [ref=f4e142]:
              - strong [ref=f4e143]: 远程文件管理
